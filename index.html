<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha do Agrinho - Pixel RPG Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; background-color: #244414; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* UI Superior de Canto (Estilo RPG Retro) */
        #ui-top { position: absolute; top: 15px; left: 15px; background: #1a1510; color: #f4ecd8; padding: 15px; border-radius: 4px; border: 4px solid #b8860b; z-index: 10; min-width: 280px; box-shadow: 0 6px 0px #0c0a07; }
        #ui-top h2 { margin: 0 0 8px 0; color: #ffcc00; font-size: 18px; text-align: center; border-bottom: 2px dashed #443322; padding-bottom: 5px; text-transform: uppercase; }
        #ui-top p { margin: 6px 0; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
        #shop-timer { color: #ff4444; font-size: 12px; font-weight: bold; margin-top: 8px; text-align: center; background: #2a1111; padding: 4px; border: 1px solid #551111; }
        #active-buffs { margin-top: 8px; font-size: 11px; color: #5cc8ff; line-height: 1.4; }
        
        /* Botão de Mochila Estilizado */
        .btn-mochila { width: 100%; margin-top: 10px; background: #3a5fcd; color: white; border: 2px solid #284291; border-bottom-width: 5px; padding: 6px; font-weight: bold; cursor: pointer; font-size: 12px; font-family: inherit; text-transform: uppercase; }
        .btn-mochila:active { border-bottom-width: 2px; margin-top: 13px; margin-bottom: -3px; }

        /* Hotbar Pixel Art */
        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: #221a15; padding: 8px; border: 4px solid #553311; border-radius: 2px; z-index: 20; box-shadow: 0 6px 0 #0c0a07; }
        .hotbar-slot { width: 50px; height: 50px; background: #3d2d22; border: 3px solid #1f140e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: all 0.1s; }
        .hotbar-slot.selected { border-color: #ffd700; background: #5a4535; transform: scale(1.05); }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 3px; font-size: 10px; color: #887766; }
        .hotbar-slot .slot-icon { font-size: 22px; margin-top: 2px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 3px; font-size: 11px; color: #ffd700; font-weight: bold; }

        /* Mapa do Jogo Estilo Grid Verde Clássico */
        #game-canvas { width: 100vw; height: 100vh; position: relative; background: #346c24; background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px); background-size: 32px 32px; }
        
        /* Entidades e Sprites */
        .character { position: absolute; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        #player { background: #ffcc00; border: 3px solid #1a1510; border-radius: 4px; z-index: 5; font-size: 26px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        
        .npc { font-size: 26px; z-index: 4; background: #2b4d75; border: 3px solid #1a1510; border-radius: 4px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        #npc-tiao { background: #3a6fa5; }
        #npc-mago { background: #6a329b; }
        #npc-hacker { background: #222222; border-color: #33ff33; }
        .npc-label { position: absolute; top: -28px; background: #1a1510; color: #f4ecd8; padding: 2px 6px; border: 2px solid #b8860b; font-size: 10px; font-weight: bold; white-space: nowrap; font-family: inherit; }

        /* Zona de Cultivo Centralizada */
        #farm-zones { position: absolute; top: 220px; left: 340px; display: flex; flex-wrap: wrap; gap: 12px; max-width: calc(100vw - 380px); }
        .plot { width: 84px; height: 84px; background: #50341c; border: 4px solid #2d1d0f; border-radius: 2px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 0 4px 8px rgba(0,0,0,0.6); }
        .plot:hover { border-color: #7bb842; }
        
        /* Efeitos Visuais das Mutações (Aprimorados) */
        .crop { font-size: 36px; animation: bobbing 1s infinite alternate ease-in-out; position: relative; display: flex; flex-direction: column; align-items: center; z-index: 2; }
        .crop.growing { filter: grayscale(70%) brightness(60%) scale(0.6); animation: none; }
        
        /* Balanceamento Visual das Mutações */
        .crop.golden { filter: drop-shadow(0px 0px 8px #ffd700) brightness(1.2); }
        .crop.lightning { filter: drop-shadow(0px 0px 10px #33ccff) brightness(1.3); animation: glitch 0.2s infinite alternate; }
        .crop.frozen { filter: drop-shadow(0px 0px 8px #aaddff) saturate(0.6) brightness(1.1); }
        .crop.infernal { filter: drop-shadow(0px 0px 12px #ff3300) brightness(1.2); animation: glitch 0.4s infinite alternate; }
        .crop.toxic { filter: drop-shadow(0px 0px 6px #22ff22) grayscale(20%); }
        .crop.divine { filter: drop-shadow(0px 0px 16px #ff00ff) drop-shadow(0px 0px 4px #ffd700); }
        
        /* SEGUNDA MELHOR: Efeito de buraco negro/redemoinho da Mutação Cósmica */
        .crop.cosmic { filter: drop-shadow(0px 0px 14px #9400d3) drop-shadow(0px 0px 6px #00ffff); animation: spin 4s infinite linear; }

        @keyframes bobbing { 0% { transform: translateY(0px); } 100% { transform: translateY(-4px); } }
        @keyframes glitch { 0% { transform: skewX(-2deg) scale(0.97); } 100% { transform: skewX(2deg) scale(1.03); } }
        @keyframes spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.08); } 100% { transform: rotate(360deg) scale(1); } }

        /* Barra de Progresso RPG */
        .timer-bar { position: absolute; bottom: 6px; left: 6px; width: calc(100% - 12px); height: 8px; background: #1a1510; border: 1px solid #443322; padding: 1px; }
        .timer-fill { height: 100%; width: 0%; background: #4caf50; box-shadow: inset 0 1px 2px rgba(255,255,255,0.4); }

        /* Modais Retrô */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #221a15; border: 4px solid #b8860b; padding: 20px; z-index: 100; width: 90%; max-width: 540px; box-shadow: 0 12px 0px #0c0a07; max-height: 85vh; overflow-y: auto; color: #f4ecd8; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #443322; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; color: #ffd700; text-transform: uppercase; font-size: 16px; }
        .close-btn { background: #a62b2b; color: white; border: 2px solid #551111; border-bottom-width: 4px; padding: 4px 10px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .close-btn:active { border-bottom-width: 2px; margin-top: 2px; }
        
        .shop-tabs { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 8px; background: #3d2d22; border: 2px solid #1f140e; color: #c4b5a3; cursor: pointer; font-weight: bold; font-size: 11px; font-family: inherit; text-transform: uppercase; }
        .tab-btn.active { background: #b8860b; color: #1a1510; border-color: #ffd700; }

        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border: 2px solid #3d2d22; background: #2d2017; }
        .item-info { display: flex; align-items: center; gap: 12px; }
        .item-icon { font-size: 28px; }
        .item-details p { margin: 2px 0; font-size: 11px; color: #bcaaa4; }
        .buy-btn { background: #38761d; color: white; border: 2px solid #1b3d0f; border-bottom-width: 4px; padding: 6px 12px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .buy-btn:disabled { background: #444; border-color: #222; cursor: not-allowed; color: #777; }
        .buy-btn:active:not(:disabled) { border-bottom-width: 2px; margin-top: 2px; }
        
        .adm-field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .adm-field label { font-weight: bold; color: #33ff33; font-size: 11px; text-transform: uppercase; }
        .adm-field input, .adm-field select { padding: 6px; background: #111; border: 2px solid #33ff33; color: #00ff00; font-family: inherit; }

        #holding-ui { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1a1510; color: #f4ecd8; padding: 6px 16px; border: 3px solid #38761d; font-weight: bold; display: none; z-index: 10; font-size: 12px; box-shadow: 0 4px 0 #0c0a07; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>Fazenda Agrinho</h2>
        <p><span>🪙 Moedas:</span> <span id="coin-count">150</span></p>
        <p><span>🌱 Equipado:</span> <span id="selected-seed-text">Nenhum</span></p>
        <button class="btn-mochila" onclick="openBackpackModal()">🎒 Mochila [Space]</button>
        <div id="active-buffs"></div>
        <div id="shop-timer">Loja reestoca em: 03:00</div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
    </div>

    <div id="holding-ui">
        Segurando: <span id="holding-item">Nada</span> 
        <button onclick="sellHandItem()" style="margin-left:8px; background:#b8860b; color:#1a1510; border:none; padding:2px 6px; font-family:inherit; font-weight:bold; cursor:pointer;">Vender</button>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 300px; left: 250px;">👨‍🌾</div>
        
        <div id="npc-tiao" class="character npc" style="top: 100px; left: 140px;">🏪<span class="npc-label">Mercado Tião [E]</span></div>
        <div id="npc-mago" class="character npc" style="top: 100px; left: 800px;">🧙‍♂️<span class="npc-label">Altar Místico [E]</span></div>
        <div id="npc-hacker" class="character npc" style="top: 480px; left: 140px;">🕵️‍♂️<span class="npc-label">Hacker Terminal [E]</span></div>
        
        <div id="farm-zones"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Menu</h3>
            <button class="close-btn" onclick="closeModal()">X</button>
        </div>
        <div class="shop-tabs" id="modal-tabs"></div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        let player = { x: 250, y: 300, speed: 5, holding: null, activeHotbarSlot: 0 };
        let gameState = { coins: 150, maxPlots: 6, speedMultiplier: 1.0, weightBonus: 0, mutationChance: 0.15, hackerUnlocked: false };
        let currentModalNPC = null;
        
        let backpack = {
            maca: 2, banana: 2, laranja: 0, morango: 0, melancia: 0, abacaxi: 0, 
            uva: 0, coco: 0, kiwi: 0, cereja: 0, pitaya: 0, estelar: 0
        };

        let hotbar = [
            { id: null, qty: 0 }, { id: null, qty: 0 }, { id: null, qty: 0 }, { id: null, qty: 0 },
            { id: null, qty: 0 }, { id: null, qty: 0 }, { id: null, qty: 0 }, { id: null, qty: 0 }
        ];

        let keysPressed = {};
        let shopStock = {};
        let currentStoreSeeds = [];
        let shopTimer = 180;
        let plots = [];
        let activeBuffs = {}; 

        const fruitData = {
            maca: { name: "Maçã", icon: "🍎", basePrice: 15, weightMin: 0.3, time: 4, chance: 100 },
            banana: { name: "Banana", icon: "🍌", basePrice: 20, weightMin: 0.2, time: 6, chance: 100 },
            laranja: { name: "Laranja", icon: "🍊", basePrice: 25, weightMin: 0.4, time: 8, chance: 95 },
            morango: { name: "Morango", icon: "🍓", basePrice: 35, weightMin: 0.05, time: 12, chance: 85 },
            melancia: { name: "Melancia", icon: "🍉", basePrice: 50, weightMin: 2.0, time: 16, chance: 75 },
            abacaxi: { name: "Abacaxi", icon: "🍍", basePrice: 65, weightMin: 1.2, time: 20, chance: 65 },
            uva: { name: "Uva", icon: "🍇", basePrice: 80, weightMin: 0.5, time: 24, chance: 55 },
            coco: { name: "Coco", icon: "🥥", basePrice: 110, weightMin: 1.5, time: 30, chance: 45 },
            kiwi: { name: "Kiwi", icon: "🥝", basePrice: 130, weightMin: 0.1, time: 35, chance: 35 },
            cereja: { name: "Cereja", icon: "🍒", basePrice: 160, weightMin: 0.02, time: 40, chance: 25 },
            pitaya: { name: "Pitaya", icon: "🐲", basePrice: 210, weightMin: 0.6, time: 50, chance: 15 },
            estelar: { name: "Estelar", icon: "🌌", basePrice: 350, weightMin: 1.0, time: 60, chance: 8 }
        };

        const upgrades = [
            { id: 'expand', name: 'Expandir Lote (+1 Terreno)', cost: 150, type: 'perm', action: () => { gameState.maxPlots++; createPlots(); } },
            { id: 'vitamin', name: 'Vitaminas Orgânicas (+600g peso)', cost: 220, type: 'perm', action: () => { gameState.weightBonus += 0.6; } },
            
            { id: 'fert_ruim', name: '💩 Adubo Estrume (+0.2x Vel)', cost: 15, type: 'buff', duration: 60, speed: 0.8, buffKey: 'Ruim', noStack: false },
            { id: 'fert_normal', name: '🧪 Fertilizante Comum (+0.5x Vel)', cost: 45, type: 'buff', duration:120, speed: 0.5, buffKey: 'Normal', noStack: false },
            { id: 'fert_super', name: '⚡ Hiper-Nutriente (+2.0x Vel)', cost: 120, type: 'buff', duration: 15, speed: 0.2, buffKey: 'Super', noStack: true }
        ];

        const magicItems = [
            { id: 'potion_cosmic', name: 'Essência de Buraco Negro (Alta Mutação)', cost: 130, duration: 45, type: 'magic_buff', buffKey: 'Cosmic', label: '🌌 Altar Cósmico' },
            { id: 'potion_lightning', name: 'Encantamento Tempestuoso (100% Elétrico)', cost: 180, duration: 30, type: 'magic_buff', buffKey: 'ForceLightning', label: '⚡ Fúria Elétrica' },
            { id: 'potion_frozen', name: 'Elixir do Inverno Crio (100% Congelado)', cost: 250, duration: 30, type: 'magic_buff', buffKey: 'ForceFrozen', label: '❄️ Congelamento' },
            { id: 'potion_divine', name: 'Bênção Suprema Divina (100% Divino)', cost: 500, duration: 20, type: 'magic_buff', buffKey: 'ForceDivine', label: '👑 Aura Divina' }
        ];

        // INICIALIZAÇÃO SEGURA DO FAZENDEIRO E JOGO
        function init() {
            createPlots();
            refreshShopSeeds();
            updateUI();
            
            // Move as primeiras sementes da mochila para a hotbar para o jogador começar jogando
            moveBackpackToHotbar('maca');
            moveBackpackToHotbar('banana');
            updateHotbarVisuals();

            // Loop de tempo dos estoques da loja
            setInterval(() => {
                shopTimer--;
                if (shopTimer <= 0) { refreshShopSeeds(); shopTimer = 180; }
                let mins = Math.floor(shopTimer / 60), secs = shopTimer % 60;
                document.getElementById('shop-timer').innerText = `Loja reestoca em: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);

            // Loop de atualização das plantas (200ms)
            setInterval(() => {
                let currentSpeedMod = 1.0;
                let activeBuffDescriptions = [];

                let speedSuper = upgrades.find(u => u.id === 'fert_super').speed;
                let speedNormal = upgrades.find(u => u.id === 'fert_normal').speed;
                let speedRuim = upgrades.find(u => u.id === 'fert_ruim').speed;

                if (activeBuffs['Super'] && activeBuffs['Super'] > 0) {
                    activeBuffs['Super']--; currentSpeedMod = speedSuper;
                    activeBuffDescriptions.push(`⚡ Hiper-Nutriente (${activeBuffs['Super']}s)`);
                } else if (activeBuffs['Normal'] && activeBuffs['Normal'] > 0) {
                    activeBuffs['Normal']--; currentSpeedMod = speedNormal;
                    activeBuffDescriptions.push(`🧪 Fertilizante Comum (${activeBuffs['Normal']}s)`);
                } else if (activeBuffs['Ruim'] && activeBuffs['Ruim'] > 0) {
                    activeBuffs['Ruim']--; currentSpeedMod = speedRuim;
                    activeBuffDescriptions.push(`💩 Adubo Estrume (${activeBuffs['Ruim']}s)`);
                }
                
                magicItems.forEach(m => {
                    if (activeBuffs[m.buffKey] && activeBuffs[m.buffKey] > 0) {
                        activeBuffs[m.buffKey]--;
                        activeBuffDescriptions.push(`${m.label} (${activeBuffs[m.buffKey]}s)`);
                    }
                });

                gameState.speedMultiplier = currentSpeedMod;
                document.getElementById('active-buffs').innerHTML = activeBuffDescriptions.length ? "✨ <b>Efeitos:</b><br>" + activeBuffDescriptions.join("<br>") : "";

                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= 0.2;
                        let totalTime = fruitData[plot.fruit].time * gameState.speedMultiplier;
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;

                        if (plot.timer <= 0) {
                            plot.status = 'ready';
                            let cropDiv = plot.element.querySelector('.crop');
                            if (cropDiv) {
                                cropDiv.classList.remove('growing');
                                if (plot.mutationType) cropDiv.classList.add(plot.mutationType);
                            }
                            let timerBar = plot.element.querySelector('.timer-bar');
                            if (timerBar) timerBar.remove();
                        }
                    }
                });
            }, 200);

            // Gerenciador de Input / Teclado
            window.addEventListener('keydown', e => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (currentModalNPC === 'mochila') closeModal();
                    else openBackpackModal();
                    return;
                }
                keysPressed[e.key.toLowerCase()] = true;
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
            });
            window.addEventListener('keyup', e => { keysPressed[e.key.toLowerCase()] = false; });

            // Inicia o Loop de Render
            gameLoop();
        }

        function addSeedToInventory(seedKey) {
            for (let i = 0; i < 8; i++) {
                if (hotbar[i].id === seedKey) { hotbar[i].qty++; return; }
            }
            for (let i = 0; i < 8; i++) {
                if (hotbar[i].id === null) { hotbar[i].id = seedKey; hotbar[i].qty = 1; return; }
            }
            backpack[seedKey]++;
        }

        // NOVO BALANCEAMENTO: MUTAÇÃO CÓSMICA ATUALIZADA COMO A SEGUNDA MELHOR
        function generateMutation() {
            if (activeBuffs['ForceDivine'] && activeBuffs['ForceDivine'] > 0) return 'divine';
            if (activeBuffs['ForceFrozen'] && activeBuffs['ForceFrozen'] > 0) return 'frozen';
            if (activeBuffs['ForceLightning'] && activeBuffs['ForceLightning'] > 0) return 'lightning';

            let currentChance = gameState.mutationChance;
            if (activeBuffs['Cosmic'] && activeBuffs['Cosmic'] > 0) currentChance = 0.55;

            let roll = Math.random();
            if (roll < currentChance) {
                let subRoll = Math.random();
                if (subRoll < 0.25) return 'golden';
                if (subRoll < 0.50) return 'toxic';
                if (subRoll < 0.70) return 'lightning';
                if (subRoll < 0.85) return 'frozen';
                if (subRoll < 0.93) return 'infernal';
                if (subRoll < 0.98) return 'cosmic'; // Agora super rara e valiosa!
                return 'divine'; // A melhor absoluta do jogo
            }
            return null;
        }

        function createPlots() {
            const container = document.getElementById('farm-zones');
            container.innerHTML = '';
            let oldPlots = [...plots];
            plots = [];

            for(let i = 0; i < gameState.maxPlots; i++) {
                let plotDiv = document.createElement('div');
                plotDiv.className = 'plot';
                plotDiv.id = `plot-${i}`;
                plotDiv.innerHTML = `<span style="color:#2d1d0f; font-size:10px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                container.appendChild(plotDiv);

                if (oldPlots[i]) {
                    plots.push(oldPlots[i]); plots[i].element = plotDiv;
                    if (plots[i].status !== 'empty') renderPlotAsset(plots[i]);
                } else {
                    plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutationType: null, weight: 0 });
                }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit];
            let growingClass = plot.status === 'growing' ? 'growing' : '';
            let mutationClass = (plot.status === 'ready' && plot.mutationType) ? plot.mutationType : '';
            
            plot.element.innerHTML = `
                <div class="crop ${growingClass} ${mutationClass}">${data.icon}</div>
                <span style="color:#2d1d0f; font-size:10px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>
            `;
            
            if (plot.status === 'growing') {
                let timerBar = document.createElement('div');
                timerBar.className = 'timer-bar';
                timerBar.innerHTML = `<div class="timer-fill"></div>`;
                plot.element.appendChild(timerBar);
            }
        }

        function selectSlot(index) {
            player.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`);
                let item = hotbar[i];
                if (item && item.id) {
                    slot.querySelector('.slot-icon').innerText = fruitData[item.id].icon;
                    slot.querySelector('.slot-qty').innerText = item.qty;
                } else {
                    slot.querySelector('.slot-icon').innerText = '';
                    slot.querySelector('.slot-qty').innerText = '';
                }
            }
        }

        function handlePlotInteraction(index) {
            let plot = plots[index];
            let activeSlotItem = hotbar[player.activeHotbarSlot];

            if (plot.status === 'empty' && activeSlotItem && activeSlotItem.id && activeSlotItem.qty > 0) {
                plot.status = 'growing';
                plot.fruit = activeSlotItem.id;
                plot.timer = fruitData[plot.fruit].time * gameState.speedMultiplier;
                plot.mutationType = generateMutation();
                plot.weight = (Math.random() * 1.5 + fruitData[plot.fruit].weightMin) + gameState.weightBonus;

                activeSlotItem.qty--;
                if (activeSlotItem.qty <= 0) { activeSlotItem.id = null; activeSlotItem.qty = 0; }

                renderPlotAsset(plot);
                updateUI();
                updateHotbarVisuals();
            } else if (plot.status === 'ready' && !player.holding) {
                let mult = 1.0, mutName = "";
                
                if (plot.mutationType === 'toxic') { mult = 0.5; mutName = "☣️ Tóxico"; }
                if (plot.mutationType === 'golden') { mult = 2.5; mutName = "✨ Dourado"; }
                if (plot.mutationType === 'lightning') { mult = 4.0; mutName = "⚡ Elétrico"; }
                if (plot.mutationType === 'frozen') { mult = 5.5; mutName = "❄️ Congelado"; }
                if (plot.mutationType === 'infernal') { mult = 7.5; mutName = "🔥 Infernal"; }
                // CÓSMICA BALANCEADA COMO SEGUNDA MELHOR (Multiplicador 10.0x)
                if (plot.mutationType === 'cosmic') { mult = 10.0; mutName = "🌌 Cósmico"; }
                if (plot.mutationType === 'divine') { mult = 15.0; mutName = "👑 Divino"; }

                player.holding = {
                    id: plot.fruit,
                    name: `${mutName} ${fruitData[plot.fruit].name}`,
                    weight: plot.weight,
                    price: fruitData[plot.fruit].basePrice * mult * plot.weight
                };

                plot.status = 'empty'; plot.fruit = null; plot.mutationType = null;
                plot.element.innerHTML = `<span style="color:#2d1d0f; font-size:10px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                updateUI();
            }
        }

        function refreshShopSeeds() {
            currentStoreSeeds = [];
            Object.keys(fruitData).forEach(key => {
                let roll = Math.random() * 100;
                if (roll <= fruitData[key].chance) {
                    currentStoreSeeds.push(key);
                    shopStock[key] = Math.floor(Math.random() * 5) + 1;
                }
            });
            if(currentStoreSeeds.length < 3) currentStoreSeeds = ['maca', 'banana', 'laranja'];
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = Math.floor(gameState.coins);
            let item = hotbar[player.activeHotbarSlot];
            if(item && item.id) {
                document.getElementById('selected-seed-text').innerText = `${fruitData[item.id].name} (${item.qty})`;
            } else {
                document.getElementById('selected-seed-text').innerText = "Mão Vazia";
            }

            if(player.holding) {
                document.getElementById('holding-ui').style.display = 'block';
                document.getElementById('holding-item').innerText = `${player.holding.name} (${player.holding.weight.toFixed(2)} Kg) -> ${Math.floor(player.holding.price)}🪙`;
            } else {
                document.getElementById('holding-ui').style.display = 'none';
            }
        }

        function handleNPCDetection() {
            let tiaoDiv = document.getElementById('npc-tiao');
            let magoDiv = document.getElementById('npc-mago');
            let hackerDiv = document.getElementById('npc-hacker');

            let tiaoDist = Math.sqrt(Math.pow(player.x - tiaoDiv.offsetLeft, 2) + Math.pow(player.y - tiaoDiv.offsetTop, 2));
            let magoDist = Math.sqrt(Math.pow(player.x - magoDiv.offsetLeft, 2) + Math.pow(player.y - magoDiv.offsetTop, 2));
            let hackerDist = Math.sqrt(Math.pow(player.x - hackerDiv.offsetLeft, 2) + Math.pow(player.y - hackerDiv.offsetTop, 2));

            if (tiaoDist < 70) openNPCModal('tiao');
            else if (magoDist < 70) openNPCModal('mago');
            else if (hackerDist < 70) openNPCModal('hacker');
        }

        function openNPCModal(npcType) {
            let modal = document.getElementById('game-modal');
            let title = document.getElementById('modal-title');
            let tabs = document.getElementById('modal-tabs');
            modal.style.display = 'block';
            tabs.innerHTML = '';
            currentModalNPC = npcType;

            if (npcType === 'tiao') {
                title.innerText = "Mercado do Seu Tião";
                tabs.innerHTML = `
                    <button class="tab-btn active" onclick="renderTiaoShop('seeds')">🌱 Sementes</button>
                    <button class="tab-btn" onclick="renderTiaoShop('upgrades')">⚙️ Adubos / Upgrades</button>
                `;
                renderTiaoShop('seeds');
            } else if (npcType === 'mago') {
                title.innerText = "Altar do Mago Místico";
                renderMagoShop();
            } else if (npcType === 'hacker') {
                title.innerText = "Mainframe Hacker Terminal";
                if (!gameState.hackerUnlocked) {
                    let pass = prompt("Insira a chave criptográfica de acesso:");
                    if (pass === "agrinho2026") { gameState.hackerUnlocked = true; renderHackerPanel(); }
                    else { alert("Acesso Negado."); closeModal(); }
                } else { renderHackerPanel(); }
            }
        }

        function openBackpackModal() {
            let modal = document.getElementById('game-modal');
            let title = document.getElementById('modal-title');
            let tabs = document.getElementById('modal-tabs');
            modal.style.display = 'block';
            tabs.innerHTML = ''; 
            title.innerText = "🎒 Inventário do Bolso (Mochila)";
            currentModalNPC = 'mochila';
            renderBackpackManagement();
        }

        function renderTiaoShop(section) {
            let content = document.getElementById('modal-content');
            content.innerHTML = '';
            if (section === 'seeds') {
                currentStoreSeeds.forEach(k => {
                    let item = fruitData[k];
                    let cost = Math.floor(item.basePrice * 0.4);
                    let st = shopStock[k] || 0;
                    content.innerHTML += `
                        <div class="shop-item">
                            <div class="item-info"><span class="item-icon">${item.icon}</span>
                            <div class="item-details"><strong>Semente de ${item.name}</strong><p>Preço: ${cost}🪙 | Prateleira: ${st}</p></div></div>
                            <button class="buy-btn" ${st <= 0 ? 'disabled':''} onclick="buyItem('seed','${k}',${cost})">Comprar</button>
                        </div>`;
                });
            } else {
                upgrades.forEach((up, idx) => {
                    let desc = up.type === 'buff' ? `Vel: ${up.speed}x | Tempo: ${up.duration}s` : `Expansão definitiva de infraestrutura`;
                    content.innerHTML += `
                        <div class="shop-item">
                            <div class="item-info"><span class="item-icon">⚙️</span>
                            <div class="item-details"><strong>${up.name}</strong><p>${desc} | Custo: ${up.cost}🪙</p></div></div>
                            <button class="buy-btn" onclick="buyItem('upgrade',${idx},${up.cost})">Adquirir</button>
                        </div>`;
                });
            }
        }

        function renderMagoShop() {
            let content = document.getElementById('modal-content');
            content.innerHTML = '';
            magicItems.forEach((m, idx) => {
                let mDesc = m.id === 'potion_cosmic' ? 'Aumenta exponencialmente a probabilidade de mutações em geral.' : 'Sintoniza a terra para gerar 100% desta mutação.';
                content.innerHTML += `
                    <div class="shop-item">
                        <div class="item-info"><span class="item-icon">🔮</span>
                        <div class="item-details"><strong>${m.name}</strong><p>${mDesc}<br>Efeito: ${m.duration}s | Altar: ${m.cost}🪙</p></div></div>
                        <button class="buy-btn" style="background:#6a329b; border-color:#3c165a;" onclick="buyItem('magic',${idx},${m.cost})">Conjurar</button>
                    </div>`;
            });
        }

        function renderBackpackManagement() {
            let content = document.getElementById('modal-content');
            content.innerHTML = `<h4>🎒 Sementes na Mochila de Reserva:</h4><p style="font-size:11px; color:#aaa; margin-bottom:12px;">Transfira sementes guardadas diretamente para os atalhos da sua Hotbar activa.</p>`;
            
            let hasItems = false;
            Object.keys(backpack).forEach(key => {
                let qty = backpack[key];
                if(qty > 0) {
                    hasItems = true;
                    content.innerHTML += `
                        <div class="shop-item">
                            <div class="item-info"><span class="item-icon">${fruitData[key].icon}</span>
                            <div class="item-details"><strong>Sementes de ${fruitData[key].name}</strong><p>Volume guardado: ${qty} un</p></div></div>
                            <button class="buy-btn" style="background:#3a5fcd; border-color:#284291;" onclick="moveBackpackToHotbar('${key}')">Sacar p/ Hotbar</button>
                        </div>`;
                }
            });

            if(!hasItems) content.innerHTML += `<p style="color:#ff4444; font-size:12px;">Nenhum insumo sobressalente guardado na mochila.</p>`;

            content.innerHTML += `<hr style="border:1px dashed #443322; margin:15px 0;"><h4 style="color:#ffd700;">📥 Armazenar itens da Hotbar de volta no Bolso:</h4>`;
            for(let i=0; i<8; i++) {
                let item = hotbar[i];
                if(item.id) {
                    content.innerHTML += `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#2d2017; padding:8px; margin-bottom:5px; border:1px solid #3d2d22;">
                            <span style="font-size:12px;"><b>Slot ${i+1}:</b> ${fruitData[item.id].icon} (x${item.qty})</span>
                            <button class="close-btn" style="padding:2px 6px; font-size:10px;" onclick="moveHotbarToBackpack(${i})">Guardar Tudo</button>
                        </div>`;
                }
            }
        }

        function moveBackpackToHotbar(seedKey) {
            if (backpack[seedKey] > 0) {
                backpack[seedKey]--;
                addSeedToInventory(seedKey);
                updateHotbarVisuals();
                updateUI();
                if(currentModalNPC === 'mochila') renderBackpackManagement();
            }
        }

        function moveHotbarToBackpack(slotIdx) {
            let item = hotbar[slotIdx];
            if(item.id) {
                backpack[item.id] += item.qty;
                item.id = null; item.qty = 0;
                updateHotbarVisuals();
                updateUI();
                if(currentModalNPC === 'mochila') renderBackpackManagement();
            }
        }

        function renderHackerPanel() {
            let content = document.getElementById('modal-content');
            let fRuim = upgrades.find(u => u.id === 'fert_ruim');
            let fNormal = upgrades.find(u => u.id === 'fert_normal');
            let fSuper = upgrades.find(u => u.id === 'fert_super');

            content.innerHTML = `
                <div style="border-bottom: 2px solid #00ff00; padding-bottom:4px; margin-bottom:10px; color:#00ff00; font-weight:bold; font-size:12px;">[ATRIBUTOS GLOBAIS DE SISTEMA]</div>
                <div class="adm-field"><label>Saldo Monetário do Jogador:</label><input type="number" id="h-coins" value="${gameState.coins}"></div>
                <div class="adm-field"><label>Velocidade Vetorial do Jogador:</label><input type="number" id="h-speed" value="${player.speed}"></div>
                <div class="adm-field"><label>Limite Alocado de Terrenos:</label><input type="number" id="h-plots" value="${gameState.maxPlots}"></div>
                <div class="adm-field"><label>Taxa de Mutação Genética (0.0 a 1.0):</label><input type="number" id="h-mutation" value="${gameState.mutationChance}" step="0.05"></div>
                
                <div style="border-bottom: 2px solid #00ff00; padding-bottom:4px; margin-top:10px; margin-bottom:10px; color:#00ff00; font-weight:bold; font-size:12px;">[MODIFICADORES DE INSULINA DO ADUBO]</div>
                <div style="display:flex; gap:10px;">
                    <div class="adm-field" style="flex:1;"><label>Duração Ruim:</label><input type="number" id="h-ruim-dur" value="${fRuim.duration}"></div>
                    <div class="adm-field" style="flex:1;"><label>Vel Ruim:</label><input type="number" id="h-ruim-sp" value="${fRuim.speed}"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="adm-field" style="flex:1;"><label>Duração Normal:</label><input type="number" id="h-norm-dur" value="${fNormal.duration}"></div>
                    <div class="adm-field" style="flex:1;"><label>Vel Normal:</label><input type="number" id="h-norm-sp" value="${fNormal.speed}"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="adm-field" style="flex:1;"><label>Duração Super:</label><input type="number" id="h-super-dur" value="${fSuper.duration}"></div>
                    <div class="adm-field" style="flex:1;"><label>Vel Super:</label><input type="number" id="h-super-sp" value="${fSuper.speed}"></div>
                </div>

                <div style="border-bottom: 2px solid #00ff00; padding-bottom:4px; margin-top:10px; margin-bottom:10px; color:#00ff00; font-weight:bold; font-size:12px;">[INJEÇÃO FORÇADA DE SEVERIDADE]</div>
                <div class="adm-field">
                    <select id="h-type">${Object.keys(fruitData).map(k=>`<option value="${k}">${fruitData[k].name}</option>`).join('')}</select>
                    <input type="number" id="h-qty" value="0" placeholder="Quantidade">
                </div>
                <button class="buy-btn" style="background:#111; color:#00ff00; border-color:#00ff00;" onclick="executeHackerCheats()">INJETAR PARÂMETROS</button>
            `;
        }

        function executeHackerCheats() {
            gameState.coins = parseFloat(document.getElementById('h-coins').value) || gameState.coins;
            player.speed = parseFloat(document.getElementById('h-speed').value) || player.speed;
            gameState.maxPlots = parseInt(document.getElementById('h-plots').value) || gameState.maxPlots;
            gameState.mutationChance = parseFloat(document.getElementById('h-mutation').value) || gameState.mutationChance;

            let fRuim = upgrades.find(u => u.id === 'fert_ruim');
            let fNormal = upgrades.find(u => u.id === 'fert_normal');
            let fSuper = upgrades.find(u => u.id === 'fert_super');

            fRuim.duration = parseInt(document.getElementById('h-ruim-dur').value) || fRuim.duration;
            fRuim.speed = parseFloat(document.getElementById('h-ruim-sp').value) || fRuim.speed;
            fNormal.duration = parseInt(document.getElementById('h-norm-dur').value) || fNormal.duration;
            fNormal.speed = parseFloat(document.getElementById('h-norm-sp').value) || fNormal.speed;
            fSuper.duration = parseInt(document.getElementById('h-super-dur').value) || fSuper.duration;
            fSuper.speed = parseFloat(document.getElementById('h-super-sp').value) || fSuper.speed;

            let qty = parseInt(document.getElementById('h-qty').value) || 0;
            let type = document.getElementById('h-type').value;
            for(let i=0; i<qty; i++) { addSeedToInventory(type); }
            
            createPlots(); updateUI(); updateHotbarVisuals(); closeModal();
        }

        function buyItem(type, target, cost) {
            if (gameState.coins >= cost) {
                if (type === 'seed' && shopStock[target] > 0) {
                    shopStock[target]--;
                    addSeedToInventory(target);
                    renderTiaoShop('seeds');
                } else if (type === 'upgrade') {
                    let up = upgrades[target];
                    if(up.type === 'buff') {
                        if(!activeBuffs[up.buffKey]) activeBuffs[up.buffKey] = 0;
                        if(up.noStack) activeBuffs[up.buffKey] = up.duration;
                        else activeBuffs[up.buffKey] += up.duration;
                    } else { up.action(); }
                    renderTiaoShop('upgrades');
                } else if (type === 'magic') {
                    let mag = magicItems[target];
                    if(!activeBuffs[mag.buffKey]) activeBuffs[mag.buffKey] = 0;
                    activeBuffs[mag.buffKey] += mag.duration;
                    renderMagoShop();
                }
                gameState.coins -= cost; updateUI(); updateHotbarVisuals();
            }
        }

        function sellHandItem() {
            if (player.holding) { gameState.coins += player.holding.price; player.holding = null; updateUI(); }
        }
        function closeModal() { document.getElementById('game-modal').style.display = 'none'; currentModalNPC = null; }

        // LOOP DE CORRIDA RETIFICADO (Personagem 100% Visível)
        function gameLoop() {
            if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= player.speed;
            if (keysPressed['d'] || keysPressed['arrowright']) player.x += player.speed;
            if (keysPressed['w'] || keysPressed['arrowup']) player.y -= player.speed;
            if (keysPressed['s'] || keysPressed['arrowdown']) player.y += player.speed;
            
            player.x = Math.max(0, Math.min(window.innerWidth - 48, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 48, player.y));

            document.getElementById('player').style.left = player.x + 'px';
            document.getElementById('player').style.top = player.y + 'px';

            requestAnimationFrame(gameLoop);
        }

        // Carregamento Seguro
        window.onload = init;
    </script>
</body>
</html>
