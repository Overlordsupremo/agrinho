<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha Pixel RPG - Hardcore Ultimate Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a2e10; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: #fff; }
        
        #ui-top { position: absolute; top: 15px; left: 15px; background: #2c1e14; color: #f4ecd8; padding: 12px; border-radius: 2px; border: 4px solid #6b4c35; z-index: 100; min-width: 340px; box-shadow: 0 6px 0px #140d08; }
        #ui-top h2 { margin: 0 0 6px 0; color: #ffcc00; font-size: 14px; text-align: center; border-bottom: 3px double #4e3522; padding-bottom: 4px; text-transform: uppercase; text-shadow: 2px 2px #000; }
        #ui-top p { margin: 4px 0; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; }
        
        .bar-container { background: #000; border: 2px solid #444; padding: 2px; height: 18px; position: relative; margin-bottom: 4px; }
        .hp-fill { height: 100%; width: 100%; background: linear-gradient(to bottom, #ff2222, #aa0000); transition: width 0.1s; }
        .xp-fill { height: 100%; width: 0%; background: linear-gradient(to bottom, #22ff22, #00aa00); transition: width 0.1s; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0px; left: 0; font-size: 10px; font-weight: bold; color: #fff; text-shadow: 1px 1px #000; }

        .btn-ui { width: 100%; margin-top: 4px; background: #4a5da3; color: white; border: 2px solid #232e5c; border-bottom-width: 4px; padding: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-ui:active { border-bottom-width: 2px; margin-top: 6px; margin-bottom: -2px; }

        #adm-trigger { position: absolute; top: 15px; right: 15px; background: #990000; color: #fff; border: 3px solid #ff3333; padding: 8px 12px; font-weight: bold; font-size: 12px; cursor: pointer; z-index: 200; text-transform: uppercase; }
        #adm-panel { display: none; position: absolute; top: 60px; right: 15px; background: #111116; border: 4px solid #ff3333; padding: 12px; z-index: 200; width: 340px; color: #00ff00; max-height: 85vh; overflow-y: auto; }
        .adm-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 11px; }
        .adm-input { width: 50%; background: #222; border: 1px solid #ff3333; color: #00ff00; padding: 2px; font-family: inherit; }

        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: #18120c; padding: 6px; border: 4px solid #4a3319; z-index: 100; }
        .hotbar-slot { width: 54px; height: 54px; background: #362517; border: 3px solid #22160e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.selected { border-color: #ffaa00; background: #4e3522; }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8c735b; }
        .hotbar-slot .slot-icon { font-size: 20px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 2px; font-size: 10px; color: #ffcc00; font-weight: bold; }
        .hotbar-slot .slot-lvl { position: absolute; top: 1px; right: 2px; font-size: 9px; color: #5cc8ff; font-weight: bold; }

        #game-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #4d7a34; background-image: radial-gradient(#56873b 20%, transparent 20%); background-size: 16px 16px; z-index: 1; }
        #game-canvas.dungeon-mode { background: #1d1d24; background-image: linear-gradient(45deg, #16161c 25%, transparent 25%); background-size: 32px 32px; }
        #game-canvas.infernal-mode { background: #3a0d0d; background-image: linear-gradient(45deg, #260505 25%, transparent 25%); background-size: 32px 32px; }
        
        #player { position: absolute; width: 42px; height: 52px; background: #7fa4ff; border: 3px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 50; }
        #weapon-render { position: absolute; right: -12px; top: 8px; font-size: 18px; transition: transform 0.1s; transform-origin: bottom left; }

        .character { position: absolute; width: 50px; height: 50px; font-size: 24px; z-index: 10; border: 3px solid #1a110b; display: flex; align-items: center; justify-content: center; }
        .npc-label { position: absolute; top: -24px; background: #1c120c; color: #f4ecd8; padding: 2px 5px; border: 2px solid #573b24; font-size: 9px; font-weight: bold; white-space: nowrap; }
        
        #farm-zones { position: absolute; top: 180px; left: 340px; display: flex; flex-wrap: wrap; gap: 6px; max-width: calc(100vw - 380px); z-index: 5; max-height: 60vh; overflow-y: auto; padding: 10px; }
        .plot { width: 68px; height: 68px; background: #422a18; border: 4px solid #26170c; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .dungeon-ent { position: absolute; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 20; border-radius: 4px; }
        .ent-label { position: absolute; top: -22px; font-size: 9px; background: rgba(0,0,0,0.8); padding: 1px 3px; white-space: nowrap; border-radius: 2px; }
        .projectile { position: absolute; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 60; pointer-events: none; }

        .crop { font-size: 28px; display: flex; flex-direction: column; align-items: center; }
        .crop.growing { filter: grayscale(80%) brightness(40%) scale(0.6); }
        
        /* Mutações */
        .m-golden { filter: drop-shadow(0px 0px 4px #ffd700) brightness(1.2); }
        .m-frozen { filter: drop-shadow(0px 0px 4px #70c5ff) hue-rotate(140deg); }
        .m-divine { filter: drop-shadow(0px 0px 6px #ff00ff) brightness(1.3); }
        .m-radioactive { filter: drop-shadow(0px 0px 5px #39ff14) saturate(2); }
        .m-infernal { filter: drop-shadow(0px 0px 5px #ff3300) contrast(1.3); }
        
        .timer-bar { position: absolute; bottom: 2px; left: 2px; width: calc(100% - 4px); height: 4px; background: #111; }
        .timer-fill { height: 100%; width: 0%; background: #38b349; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #291c12; border: 4px solid #543a24; padding: 16px; z-index: 200; width: 90%; max-width: 580px; color: #f4ecd8; box-shadow: 0 8px 0 #000; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #402b1b; padding-bottom: 4px; margin-bottom: 8px; }
        .close-btn { background: #912323; color: white; border: 2px solid #4a1212; padding: 2px 6px; cursor: pointer; font-family: inherit; }
        
        .shop-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
        .tab-btn { flex: 1; padding: 4px; background: #3d281a; border: 2px solid #1a100a; color: #bfaea0; cursor: pointer; font-size: 11px; font-family: inherit; }
        .tab-btn.active { background: #735135; color: #fff; border-color: #ffaa00; }

        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 4px; max-height: 45vh; overflow-y: auto; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 6px; border: 2px solid #3d281a; background: #21160e; font-size: 11px; }
        .buy-btn { background: #2b5c16; color: white; border: 2px solid #142e09; border-bottom-width: 3px; padding: 3px 6px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .buy-btn:disabled { background: #3a3a3a; border-color: #111; color: #666; cursor: not-allowed; }
        
        #portal-infernal { display: none; position: absolute; top: 450px; left: 850px; width: 60px; height: 60px; font-size: 40px; background: radial-gradient(#ff0000, transparent); border-radius: 50%; justify-content: center; align-items: center; animation: pulse 1s infinite; cursor: pointer; z-index: 40; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>Fazenda RPG Core v5.5</h2>
        <div class="bar-container">
            <div id="hp-bar" class="hp-fill"></div>
            <div id="hp-text" class="bar-text">HP: 100 / 100</div>
        </div>
        <div class="bar-container">
            <div id="xp-bar" class="xp-fill"></div>
            <div id="xp-text" class="bar-text">XP: 0 / 100 (Nível 1)</div>
        </div>
        <p><span>🪙 Moedas:</span> <span id="coin-count">150</span></p>
        <p><span>🛡️ Armadura:</span> <span id="armor-status" style="color:#aaa;">Nenhuma</span></p>
        <p><span>⚔️ Arma:</span> <span id="weapon-status" style="color: #ffaa00;">Espada de Ferro</span></p>
        <p><span>🌱 Item Ativo:</span> <span id="selected-seed-text">Mão Vazia</span></p>
        <button class="btn-ui" onclick="openBackpackModal()">🎒 Mochila, Status & Forja [Espaço]</button>
        <button class="btn-ui" id="btn-buy-plot" onclick="buyNewPlot()" style="background:#c27f38; border-color:#6e4215;">🟫 Expandir Lote (<span id="plot-cost">200</span> 🪙)</button>
    </div>

    <button id="adm-trigger" onclick="tryAccessAdm()">🛠️ Painel ADM</button>
    <div id="adm-panel">
        <h3>Menu de Hack Único</h3>
        <button class="buy-btn" style="width:100%; background:#00ff00; color:#000; margin-bottom:8px;" onclick="aplicarAlteracoesADM()">⚡ Aplicar Modificações</button>
        <div class="adm-row"><label>🪙 Moedas:</label><input type="number" id="adm-coins" class="adm-input" value="150"></div>
        <div class="adm-row"><label>⭐ Nível Jogador:</label><input type="number" id="adm-lvl" class="adm-input" value="1"></div>
        <div class="adm-row"><label>💪 Pontos de Atributo:</label><input type="number" id="adm-pts" class="adm-input" value="0"></div>
        <div class="adm-row"><label>😈 Andar Masmorra:</label><input type="number" id="adm-floor" class="adm-input" value="1"></div>
        <div class="adm-row"><label>🟫 Qtd Lotes:</label><input type="number" id="adm-plots" class="adm-input" value="3"></div>
        <div class="adm-row"><label>🪨 Ferro:</label><input type="number" id="adm-m1" class="adm-input" value="0"></div>
        <div class="adm-row"><label>✨ Ouro:</label><input type="number" id="adm-m2" class="adm-input" value="0"></div>
        <div class="adm-row"><label>🔥 Obsidiana:</label><input type="number" id="adm-m3" class="adm-input" value="0"></div>
        <div class="adm-row"><label>💎 Cristal:</label><input type="number" id="adm-m4" class="adm-input" value="0"></div>
        <div class="adm-row"><label>🌋 Cristal Inf.:</label><input type="number" id="adm-m5" class="adm-input" value="0"></div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3 safe">4</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 250px; left: 200px;">🤠<div id="weapon-render">⚔️</div></div>
        <div id="npc-tiao" class="character" style="top: 25px; left: 360px; background: #2f4560;">🏪<span class="npc-label">Tião [E]</span></div>
        <div id="npc-mago" class="character" style="top: 25px; left: 540px; background: #50287a;">🧙‍♂️<span class="npc-label">Mago [E]</span></div>
        <div id="npc-chico" class="character" style="top: 25px; left: 720px; background: #7a431d;">👨‍💼<span class="npc-label">Chico [E]</span></div>
        <div id="npc-dungeon" class="character" style="top: 450px; left: 1100px; background: #14111f; border-color: #991b1b;">😈<span class="npc-label" style="color:#f87171;">Masmorra [E]</span></div>
        
        <div id="portal-infernal" onclick="entrarMasmorraInfernal()">🌀</div>
        <div id="farm-zones"></div>
        <div id="dungeon-entities-layer"></div>
        <div id="projectiles-layer"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header"><h3 id="modal-title">Painel</h3><button class="close-btn" onclick="closeModal()">X</button></div>
        <div class="shop-tabs" id="modal-tabs"></div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        // STATUS JOGADOR - Começa com 3 lotes nativos
        let player = { 
            x: 200, y: 250, speedBase: 5, inDungeon: false, isInfernal: false, weapon: 'espada', armor: 'nenhuma', enchantment: null,
            hp: 100, lvl: 1, xp: 0, nextXp: 100, statPoints: 0,
            stats: { vida: 0, dano: 0, defesa: 0, sorte: 0, velocidade: 0, critico: 0 }
        };

        let gameState = { coins: 150, maxPlots: 3, activeHotbarSlot: 0, currentMutationAltar: null, admUnlocked: false };
        
        let arsenal = {
            espada: { name: "Espada de Ferro", icon: "⚔️", damage: 18, range: 70, speed: 200, ranged: false },
            lança: { name: "Lança Pontuda", icon: "🔱", damage: 24, range: 120, speed: 380, ranged: false },
            arco: { name: "Arco de Caça", icon: "🏹", damage: 15, range: 400, speed: 650, ranged: true },
            adaga: { name: "Adaga Sombria", icon: "🗡️", damage: 14, range: 50, speed: 120, ranged: false },
            martelo: { name: "Martelo Titânico", icon: "🔨", damage: 45, range: 80, speed: 700, ranged: false },
            cetro: { name: "Cetro Solar", icon: "🔱", damage: 32, range: 100, speed: 400, ranged: false },
            arco_void: { name: "Arco do Vazio", icon: "🏹", damage: 38, range: 500, speed: 500, ranged: true },
            espada_cristal: { name: "Lâmina de Cristal", icon: "💎", damage: 55, range: 85, speed: 240, ranged: false },
            lamina_infernal: { name: "Lâmina Infernal", icon: "🔥", damage: 75, range: 90, speed: 220, ranged: false }
        };

        let armaduras = {
            nenhuma: { name: "Nenhuma", def: 0 },
            ferro: { name: "Armadura de Ferro", def: 10 },
            ouro: { name: "Armadura de Ouro", def: 22 },
            cristal: { name: "Armadura de Cristal", def: 45 },
            escamas: { name: "Armadura de Escamas", def: 35 },
            crista: { name: "Armadura de Crista", def: 55 },
            infernal_suprema: { name: "Armadura Infernal Suprema", def: 100 }
        };

        let minerios = { ferro: 0, ouro: 0, obsidiana: 0, cristal: 0, cristal_infernal: 0 };
        let dropsMasmorra = { escamas: 0, essencias: 0 };
        let hotbar = Array(8).fill(null).map(() => ({ id: null, qty: 0, type: '', level: 1, data: null }));

        let dungeon = { floor: 1, entities: [], floorCleared: false };
        let projectiles = [];
        let keysPressed = {};
        let plots = [];
        let shopStock = {};
        let attackCooldown = false;
        let currentModalNPC = null;

        const fruitData = {
            maca: { name: "Maçã", icon: "🍎", basePrice: 15, time: 4, weightMin: 0.3 },
            banana: { name: "Banana", icon: "🍌", basePrice: 20, time: 6, weightMin: 0.2 },
            cenoura: { name: "Cenoura", icon: "🥕", basePrice: 22, time: 5, weightMin: 0.15 },
            laranja: { name: "Laranja", icon: "🍊", basePrice: 25, time: 8, weightMin: 0.4 },
            melancia: { name: "Melancia", icon: "🍉", basePrice: 80, time: 20, weightMin: 3.5 },
            uva: { name: "Uva Arfante", icon: "🍇", basePrice: 110, time: 22, weightMin: 0.2 }
        };

        const mutationConfig = {
            golden: { label: "Dourada ✨", mult: 3.0, class: "m-golden" },
            frozen: { label: "Congelada ❄️", mult: 2.2, class: "m-frozen" },
            divine: { label: "Divina 🌌", mult: 6.0, class: "m-divine" },
            radioactive: { label: "Radioativa ☢️", mult: 4.5, class: "m-radioactive" },
            infernal: { label: "Infernal 🔥", mult: 7.0, class: "m-infernal" }
        };

        const bossesNormais = [
            { name: "Slime Gigante Recheado", icon: "🤢", hp: 120, lvl: 3 },
            { name: "Lobisomem Alfa Alfa", icon: "🐺", hp: 250, lvl: 5 },
            { name: "Guarda Réptil Supremo", icon: "🐊", hp: 450, lvl: 8 },
            { name: "Golem de Pedra Rúnica", icon: "🗿", hp: 700, lvl: 12 },
            { name: "Agrinho Corrompido [FINAL]", icon: "😈", hp: 1200, lvl: 16, isFinal: true }
        ];

        const bossesInfernais = [
            { name: "Demônio de Puro Sangue", icon: "👹", hp: 1800, lvl: 20 },
            { name: "Lich de Chamas Negras", icon: "🧙", hp: 2600, lvl: 25 },
            { name: "Cérbero Infernal", icon: "🐕", hp: 3800, lvl: 30 },
            { name: "Homem Lagarto Infernal [BOSS]", icon: "🦎", hp: 5500, lvl: 36 },
            { name: "Imperador do Caos Cósmico", icon: "👑", hp: 9999, lvl: 50, isAbsolute: true }
        ];

        const encantamentos = {
            flame1: { name: "Flame I", desc: "Aplica chamas por 5 segundos", price: 100 },
            frost1: { name: "Frost I", desc: "Reduz a velocidade do alvo", price: 120 },
            vamp1: { name: "Vampirismo I", desc: "Cura 5% do dano causado", price: 200 },
            force1: { name: "Força Bruta", desc: "+10 de dano fixo", price: 150 },
            crit1: { name: "Olho Fatal", desc: "+15% chance crítica", price: 180 },
            void1: { name: "Toque do Vazio", desc: "Chance de desintegrar mobs pequenos", price: 300 },
            light1: { name: "Iluminação", desc: "Dano dobrado contra bosses infernais", price: 250 }
        };

        function init() {
            createPlots();
            refreshShopSeeds();
            updateUI();
            updateHotbarVisuals();

            // Loops de efeitos periódicos (Ex: Incêndio/Flame)
            setInterval(() => {
                if (player.inDungeon) {
                    dungeon.entities.forEach(ent => {
                        if (ent.type === 'mob' && ent.burnTicks > 0) {
                            ent.burnTicks--;
                            ent.hp -= 8; // Dano contínuo por segundo
                            ent.el.querySelector('.hp-fill').style.width = `${Math.max(0, (ent.hp/ent.maxHp)*100)}%`;
                            if (ent.hp <= 0) handleEntityDeath(ent);
                        }
                    });
                    dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
                    checkDungeonFloorClear();
                }
            }, 1000);

            setInterval(() => {
                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= 0.1;
                        let totalTime = fruitData[plot.fruit].time;
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;
                        if (plot.timer <= 0) { plot.status = 'ready'; renderPlotAsset(plot); }
                    }
                });
                if (player.inDungeon) { dungeonLogicUpdate(); projectilesUpdate(); }
            }, 100);

            // Escuta de teclado nativa sem delay de repetição
            window.addEventListener('keydown', e => {
                keysPressed[e.key.toLowerCase()] = true;
                if (document.activeElement.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); if (currentModalNPC) closeModal(); else openBackpackModal(); }
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
            });

            window.addEventListener('keyup', e => { delete keysPressed[e.key.toLowerCase()]; });

            document.getElementById('game-canvas').addEventListener('mousedown', (e) => {
                if (player.inDungeon) executeAttack(e.clientX, e.clientY);
            });

            gameLoop();
        }

        function tryAccessAdm() {
            if (gameState.admUnlocked) {
                let panel = document.getElementById('adm-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                syncAdmPanelInputs();
            } else {
                let pass = prompt("Digite a senha de administrador:");
                if (pass === "agrinho2026") {
                    gameState.admUnlocked = true;
                    document.getElementById('adm-panel').style.display = 'block';
                    syncAdmPanelInputs();
                } else {
                    alert("❌ Senha Incorreta!");
                }
            }
        }

        function syncAdmPanelInputs() {
            document.getElementById('adm-coins').value = gameState.coins;
            document.getElementById('adm-lvl').value = player.lvl;
            document.getElementById('adm-pts').value = player.statPoints;
            document.getElementById('adm-floor').value = dungeon.floor;
            document.getElementById('adm-plots').value = gameState.maxPlots;
            document.getElementById('adm-m1').value = minerios.ferro;
            document.getElementById('adm-m2').value = minerios.ouro;
            document.getElementById('adm-m3').value = minerios.obsidiana;
            document.getElementById('adm-m4').value = minerios.cristal;
            document.getElementById('adm-m5').value = minerios.cristal_infernal;
        }

        function aplicarAlteracoesADM() {
            gameState.coins = parseInt(document.getElementById('adm-coins').value) || 0;
            player.lvl = parseInt(document.getElementById('adm-lvl').value) || 1;
            player.statPoints = parseInt(document.getElementById('adm-pts').value) || 0;
            dungeon.floor = parseInt(document.getElementById('adm-floor').value) || 1;
            gameState.maxPlots = Math.min(parseInt(document.getElementById('adm-plots').value) || 3, 40);
            minerios.ferro = parseInt(document.getElementById('adm-m1').value) || 0;
            minerios.ouro = parseInt(document.getElementById('adm-m2').value) || 0;
            minerios.obsidiana = parseInt(document.getElementById('adm-m3').value) || 0;
            minerios.cristal = parseInt(document.getElementById('adm-m4').value) || 0;
            minerios.cristal_infernal = parseInt(document.getElementById('adm-m5').value) || 0;
            
            player.hp = getMaxHp();
            createPlots(); updateUI();
        }

        function getMaxHp() { return 100 + (player.stats.vida * 25) + (player.lvl * 10); }
        function getPlayerDamage() { 
            let base = arsenal[player.weapon].damage + (player.stats.dano * 4); 
            if (player.enchantment === 'force1') base += 10;
            return base;
        }
        function getPlayerSpeed() { return player.speedBase + (player.stats.velocidade * 0.4); }

        function buyNewPlot() {
            if (gameState.maxPlots >= 40) return alert("Lote máximo atingido (40)!");
            let cost = 200 + (gameState.maxPlots * 180);
            if (gameState.coins >= cost) {
                gameState.coins -= cost; gameState.maxPlots++; createPlots(); updateUI();
            } else alert("🪙 Sem moedas!");
        }

        function createPlots() {
            const container = document.getElementById('farm-zones'); container.innerHTML = '';
            let oldPlots = [...plots]; plots = [];
            for(let i = 0; i < gameState.maxPlots; i++) {
                let plotDiv = document.createElement('div'); plotDiv.className = 'plot'; container.appendChild(plotDiv);
                if (oldPlots[i]) { plots.push(oldPlots[i]); plots[i].element = plotDiv; if (plots[i].status !== 'empty') renderPlotAsset(plots[i]); }
                else { plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutations: [], weight: 1.0 }); plotDiv.innerHTML = `<span style="color:#26170c; font-size:8px; position:absolute; bottom:2px;">Terra</span>`; }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
            document.getElementById('plot-cost').innerText = 200 + (gameState.maxPlots * 180);
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit]; plot.element.innerHTML = '';
            let cropDiv = document.createElement('div'); cropDiv.className = `crop ${plot.status === 'growing' ? 'growing' : ''}`; cropDiv.innerText = data.icon;
            if (plot.status === 'ready') { plot.mutations.forEach(m => cropDiv.classList.add(mutationConfig[m].class)); }
            plot.element.appendChild(cropDiv);
            if (plot.status === 'growing') {
                let tb = document.createElement('div'); tb.className = 'timer-bar'; tb.innerHTML = `<div class="timer-fill"></div>`; plot.element.appendChild(tb);
            }
        }

        function refreshShopSeeds() {
            Object.keys(fruitData).forEach(k => { shopStock[k] = Math.floor(Math.random() * 5) + 3; });
        }

        function selectSlot(index) {
            gameState.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`); let item = hotbar[i];
                if (item && item.id) {
                    slot.querySelector('.slot-icon').innerText = item.data?.icon || fruitData[item.id.split('_')[0]]?.icon || "🧪";
                    slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                } else { slot.querySelector('.slot-icon').innerText = ''; slot.querySelector('.slot-qty').innerText = ''; }
            }
        }

        function addItemToCollectedHotbar(itemKey, type, level, dataBlock) {
            let inserido = false;
            if (type !== 'fruta') {
                for (let i = 0; i < 8; i++) {
                    if (hotbar[i].id === itemKey && hotbar[i].type === type) {
                        hotbar[i].qty++; inserido = true; break;
                    }
                }
            }
            if(!inserido) {
                for (let i = 0; i < 8; i++) {
                    if (hotbar[i].id === null) {
                        hotbar[i].id = itemKey; hotbar[i].qty = 1; hotbar[i].type = type; hotbar[i].level = level;
                        hotbar[i].data = dataBlock ? { ...dataBlock } : null;
                        inserido = true; break;
                    }
                }
            }
            updateHotbarVisuals();
        }

        function handlePlotInteraction(index) {
            if (player.inDungeon) return;
            let plot = plots[index]; let activeItem = hotbar[gameState.activeHotbarSlot];

            if (plot.status === 'empty' && activeItem && activeItem.type === 'semente' && activeItem.qty > 0) {
                plot.status = 'growing'; plot.fruit = activeItem.id.split('_')[0];
                plot.timer = fruitData[plot.fruit].time;
                plot.mutations = [];

                if (Math.random() < 0.01) plot.mutations.push('golden');
                plot.weight = parseFloat((Math.random() * 1.2 + fruitData[plot.fruit].weightMin).toFixed(2));
                
                activeItem.qty--;
                if (activeItem.qty <= 0) hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', level: 1, data: null };
                renderPlotAsset(plot); updateUI(); updateHotbarVisuals();
            } 
            else if (plot.status === 'ready') {
                let finalMult = 1.0;
                let labels = [];
                plot.mutations.forEach(m => { finalMult *= mutationConfig[m].mult; labels.push(mutationConfig[m].label); });

                let calculatedPrice = fruitData[plot.fruit].basePrice * finalMult * plot.weight;
                let finalName = `${fruitData[plot.fruit].name} (${plot.weight}kg)`;

                addItemToCollectedHotbar(`${plot.fruit}_fruta`, 'fruta', 1, {
                    icon: fruitData[plot.fruit].icon, price: calculatedPrice, fullName: finalName
                });

                plot.status = 'empty'; plot.fruit = null; renderPlotAsset(plot); updateUI();
            }
        }

        function executeAttack(targetX, targetY) {
            if (attackCooldown) return; attackCooldown = true;
            let wep = arsenal[player.weapon];
            let rw = document.getElementById('weapon-render'); rw.style.transform = "rotate(-75deg)";
            setTimeout(() => { rw.style.transform = "rotate(0deg)"; attackCooldown = false; }, wep.speed);

            let finalDmg = getPlayerDamage();
            let isCrit = Math.random() < (player.stats.critico * 0.05 + (player.enchantment === 'crit1' ? 0.15 : 0));
            if (isCrit) finalDmg *= 2;

            if (wep.ranged) {
                spawnProjectile(player.x + 20, player.y + 25, targetX, targetY, 9, "🏹", false, finalDmg);
            } else {
                dungeon.entities.forEach(ent => {
                    let d = Math.sqrt(Math.pow(player.x - ent.x, 2) + Math.pow(player.y - ent.y, 2));
                    if (d <= wep.range && ent.type === 'mob') {
                        ent.hp -= finalDmg;
                        // Encantamento de Fogo (Flame 1) - Alvo queima por 5 segundos
                        if (player.enchantment === 'flame1') ent.burnTicks = 5;
                        if (player.enchantment === 'vamp1') player.hp = Math.min(getMaxHp(), player.hp + (finalDmg * 0.05));

                        ent.el.querySelector('.hp-fill').style.width = `${Math.max(0, (ent.hp/ent.maxHp)*100)}%`;
                        if (ent.hp <= 0) handleEntityDeath(ent);
                    }
                });
                dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
                checkDungeonFloorClear();
            }
        }

        function spawnProjectile(x, y, tx, ty, speed, icon, isEnemy, damage) {
            let layer = document.getElementById('projectiles-layer'); let el = document.createElement('div');
            el.className = "projectile"; el.innerText = icon; el.style.left = x+'px'; el.style.top = y+'px';
            layer.appendChild(el);
            let dx = tx - x, dy = ty - y, dist = Math.sqrt(dx*dx + dy*dy);
            projectiles.push({ el, x, y, vx: (dx/dist)*speed, vy: (dy/dist)*speed, isEnemy, damage });
        }

        function projectilesUpdate() {
            projectiles.forEach((proj, idx) => {
                proj.x += proj.vx; proj.y += proj.vy;
                proj.el.style.left = proj.x+'px'; proj.el.style.top = proj.y+'px';

                if (!proj.isEnemy) {
                    dungeon.entities.forEach(ent => {
                        if (Math.sqrt(Math.pow(ent.x - proj.x, 2) + Math.pow(ent.y - proj.y, 2)) < 30 && ent.type === 'mob') {
                            ent.hp -= proj.damage;
                            if (player.enchantment === 'flame1') ent.burnTicks = 5;
                            ent.el.querySelector('.hp-fill').style.width = `${Math.max(0, (ent.hp/ent.maxHp)*100)}%`;
                            proj.el.remove(); projectiles.splice(idx, 1);
                            if (ent.hp <= 0) handleEntityDeath(ent);
                        }
                    });
                    dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
                    checkDungeonFloorClear();
                }
            });
        }

        function handleEntityDeath(ent) {
            ent.el.remove();
            player.xp += ent.xpReward;
            if (player.xp >= player.nextXp) {
                player.xp -= player.nextXp; player.lvl++; player.statPoints += 3; player.nextXp = Math.floor(player.nextXp * 1.5);
                player.hp = getMaxHp();
            }
            if (ent.isBoss) {
                dropsMasmorra.escamas += ent.isInfernalBoss ? 8 : 4;
            }
            updateUI();
        }

        function enterDungeon() {
            player.inDungeon = true; player.isInfernal = false;
            document.getElementById('game-canvas').className = 'dungeon-mode';
            hideFarm(); generateFloor();
        }

        function entrarMasmorraInfernal() {
            document.getElementById('portal-infernal').style.display = 'none';
            player.inDungeon = true; player.isInfernal = true;
            dungeon.floor = 6;
            document.getElementById('game-canvas').className = 'infernal-mode';
            generateFloor();
        }

        function exitDungeon() {
            player.inDungeon = false; document.getElementById('game-canvas').className = '';
            document.getElementById('portal-infernal').style.display = 'none';
            document.getElementById('dungeon-entities-layer').innerHTML = '';
            dungeon.entities = []; showFarm(); updateUI();
        }

        function hideFarm() { ['farm-zones','npc-tiao','npc-mago','npc-chico'].forEach(id => document.getElementById(id).style.display = 'none'); }
        function showFarm() { ['farm-zones','npc-tiao','npc-mago','npc-chico'].forEach(id => document.getElementById(id).style.display = 'flex'); }

        function generateFloor() {
            let layer = document.getElementById('dungeon-entities-layer'); layer.innerHTML = ''; dungeon.entities = [];
            dungeon.floorCleared = false;

            let isBossFloor = player.isInfernal ? (dungeon.floor >= 6 && dungeon.floor <= 10) : (dungeon.floor === 5);
            let mobLvl = dungeon.floor * 2;

            if (!isBossFloor) {
                for (let i = 0; i < 4; i++) {
                    let rx = Math.random() * 600 + 400, ry = Math.random() * 300 + 150;
                    createMob(`Homem Lagarto v.${mobLvl}`, rx, ry, 50 + (mobLvl * 10), "🦎", mobLvl * 12, false);
                }
            } else {
                let bossData = player.isInfernal ? bossesInfernais[dungeon.floor - 6] : bossesNormais[dungeon.floor - 1];
                if(bossData) {
                    let b = createMob(`👹 BOSS: ${bossData.name}`, 600, 300, bossData.hp, bossData.icon, bossData.lvl * 60, true, bossData.isFinal);
                    if (player.isInfernal && dungeon.floor === 9) b.isInfernalBoss = true;
                }
            }

            // Geração de recursos minerais pelas salas
            for (let m = 0; m < 2; m++) {
                let mx = Math.random() * 700 + 300, my = Math.random() * 400 + 150;
                let kind = player.isInfernal ? (Math.random() > 0.5 ? 'obsidiana' : 'cristal_infernal') : 'ferro';
                createMinerio(mx, my, kind);
            }
        }

        function createMob(name, x, y, hp, icon, xp, isBoss, isFinal = false) {
            let layer = document.getElementById('dungeon-entities-layer'); let el = document.createElement('div');
            el.className = "dungeon-ent"; el.style.left = x+'px'; el.style.top = y+'px';
            el.innerHTML = `<span class="ent-label">${name}</span>${icon}<div class="bar-container" style="width:30px;height:6px;"><div class="hp-fill"></div></div>`;
            layer.appendChild(el);
            let mobObj = { type: 'mob', x, y, hp, maxHp: hp, el, xpReward: xp, isBoss, isFinal, burnTicks: 0 };
            dungeon.entities.push(mobObj);
            return mobObj;
        }

        function createMinerio(x, y, kind) {
            let layer = document.getElementById('dungeon-entities-layer'); let el = document.createElement('div');
            el.className = "dungeon-ent"; el.style.left = x+'px'; el.style.top = y+'px';
            let icons = { ferro: "🪨", ouro: "✨", obsidiana: "🔥", cristal: "💎", cristal_infernal: "🌋" };
            el.innerHTML = `<span class="ent-label">${kind}</span>${icons[kind]}`;
            layer.appendChild(el);
            dungeon.entities.push({ type: 'minerio', x, y, el, kind });
        }

        function checkDungeonFloorClear() {
            let mobs = dungeon.entities.filter(e => e.type === 'mob');
            if (mobs.length === 0 && !dungeon.floorCleared) {
                dungeon.floorCleared = true;
                alert(`✨ Andar limpo com sucesso! Recursos salvos na mochila.`);
                if (dungeon.floor === 5) {
                    document.getElementById('portal-infernal').style.display = 'flex';
                    exitDungeon();
                } else if (dungeon.floor === 10) {
                    alert("🏆 Parabéns! Você completou o desafio final da dimensão infernal!");
                    exitDungeon();
                } else {
                    dungeon.floor++; generateFloor();
                }
            }
        }

        function dungeonLogicUpdate() {
            dungeon.entities.forEach(ent => {
                if (ent.type === 'mob') {
                    let dx = player.x - ent.x, dy = player.y - ent.y, dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 15 && dist < 300) {
                        ent.x += (dx/dist)*2; ent.y += (dy/dist)*2;
                        ent.el.style.left = ent.x+'px'; ent.el.style.top = ent.y+'px';
                    }
                } else if (ent.type === 'minerio') {
                    if (Math.sqrt(Math.pow(player.x - ent.x, 2) + Math.pow(player.y - ent.y, 2)) < 30) {
                        minerios[ent.kind]++; ent.el.remove(); updateUI();
                    }
                }
            });
        }

        function handleNPCDetection() {
            if (Math.sqrt(Math.pow(player.x - 360, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('tiao');
            else if (Math.sqrt(Math.pow(player.x - 540, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('mago');
            else if (Math.sqrt(Math.pow(player.x - 720, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('chico');
            else if (Math.sqrt(Math.pow(player.x - 1100, 2) + Math.pow(player.y - 450, 2)) < 65) enterDungeon();
        }

        function openNPCModal(npc) {
            let modal = document.getElementById('game-modal'); modal.style.display = 'block';
            let tabs = document.getElementById('modal-tabs'); tabs.innerHTML = '';
            if (npc === 'mago') {
                document.getElementById('modal-title').innerText = "Altar Encantado do Mago";
                tabs.innerHTML = `<button class="tab-btn active" onclick="renderEncantamentos()">✨ Encantar Arma</button>`;
                renderEncantamentos();
            } else if (npc === 'tiao') {
                document.getElementById('modal-title').innerText = "Sementes do Tião"; renderTiaoShop();
            } else if (npc === 'chico') {
                document.getElementById('modal-title').innerText = "Vendas Chico"; renderChicoShop();
            }
        }

        function renderEncantamentos() {
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            Object.keys(encantamentos).forEach(k => {
                let e = encantamentos[k];
                content.innerHTML += `<div class="shop-item"><div>🔮 <b>${e.name}</b> - ${e.desc}</div><button class="buy-btn" onclick="applyEnchant('${k}', ${e.price})">Encantar (${e.price}🪙)</button></div>`;
            });
        }

        function applyEnchant(key, price) {
            if (gameState.coins >= price) {
                gameState.coins -= price; player.enchantment = key;
                alert(`Arma encantada com sucesso: ${encantamentos[key].name}!`); closeModal(); updateUI();
            } else alert("Moedas insuficientes!");
        }

        function renderTiaoShop() {
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            Object.keys(fruitData).forEach(k => {
                content.innerHTML += `<div class="shop-item"><div>🌱 Semente de ${fruitData[k].name}</div><button class="buy-btn" onclick="buySeed('${k}')">Comprar (10🪙)</button></div>`;
            });
        }

        function buySeed(k) {
            if(gameState.coins >= 10) { gameState.coins -= 10; addItemToCollectedHotbar(`${k}_semente`, 'semente', 1, null); updateUI(); }
        }

        function renderChicoShop() {
            let content = document.getElementById('modal-content'); let total = 0;
            hotbar.forEach(i => { if (i && i.type === 'fruta') total += i.data.price * i.qty; });
            content.innerHTML = `<p>Ganho Estimado: ${Math.floor(total)} Moedas</p><button class="buy-btn" onclick="venderTudo(${total})">Vender Carga</button>`;
        }

        function venderTudo(t) {
            gameState.coins += t; hotbar.fill(null).map(() => ({ id: null, qty: 0, type: '', level: 1, data: null }));
            updateHotbarVisuals(); closeModal(); updateUI();
        }

        function openBackpackModal() {
            let modal = document.getElementById('game-modal'); modal.style.display = 'block';
            document.getElementById('modal-title').innerText = "Menu de Manufatura & Bolsa";
            document.getElementById('modal-tabs').innerHTML = `<button class="tab-btn active" onclick="renderStatus()">💪 Status</button><button class="tab-btn" onclick="renderForjaCustom()">🔨 Forja Avançada</button>`;
            renderStatus();
        }

        function renderStatus() {
            let content = document.getElementById('modal-content'); content.innerHTML = `<p>Pontos Inutilizados: ${player.statPoints}</p>`;
            let list = [{id:'vida', n:'Vida'}, {id:'dano', n:'Força'}, {id:'defesa', n:'Defesa'}, {id:'sorte', n:'Sorte'}, {id:'velocidade', n:'Agilidade'}, {id:'critico', n:'Precisão'}];
            list.forEach(s => {
                content.innerHTML += `<div class="shop-item"><div>${s.n}: ${player.stats[s.id]}</div><button class="buy-btn" onclick="upStat('${s.id}')">+</button></div>`;
            });
        }

        function upStat(id) { if(player.statPoints > 0) { player.statPoints--; player.stats[id]++; player.hp = getMaxHp(); renderStatus(); updateUI(); } }

        function renderForjaCustom() {
            let content = document.getElementById('modal-content');
            content.innerHTML = `<h3>Inventário de Matéria-Prima</h3><p>🪨 Fe: ${minerios.ferro} | ✨ Au: ${minerios.ouro} | 🔥 Obs: ${minerios.obsidiana} | 💎 Cristal: ${minerios.cristal} | 🌋 Cristal Inf: ${minerios.cristal_infernal} | 🦎 Escamas: ${dropsMasmorra.escamas}</p><hr>`;
            
            // Receitas de Armas Reintegradas
            content.innerHTML += `<div class="shop-item"><div>🔨 Martelo Titânico (Req: 15 Ouro)</div><button class="buy-btn" onclick="craftArma('martelo', 0, 15, 0, 0)">Forjar</button></div>`;
            content.innerHTML += `<div class="shop-item"><div>⚔️ Lâmina de Cristal (Req: 10 Cristais)</div><button class="buy-btn" onclick="craftArma('espada_cristal', 0, 0, 0, 10)">Forjar</button></div>`;
            content.innerHTML += `<div class="shop-item"><div>🔥 Lâmina Infernal (Req: 8 Cristais Infernais)</div><button class="buy-btn" onclick="craftArmaInfernal()">Forjar</button></div>`;

            // Novas Armaduras do Pedido
            content.innerHTML += `<h3>Armaduras Especiais</h3>`;
            content.innerHTML += `<div class="shop-item"><div>🛡️ Armadura de Cristal (Req: 12 Cristais)</div><button class="buy-btn" onclick="craftArmadura('cristal')">Forjar</button></div>`;
            content.innerHTML += `<div class="shop-item"><div>🛡️ Armadura de Escamas (Req: 10 Escamas)</div><button class="buy-btn" onclick="craftArmadura('escamas')">Forjar</button></div>`;
            content.innerHTML += `<div class="shop-item"><div>🛡️ Armadura de Crista (Req: 5 Obsidiana, 5 Cristais)</div><button class="buy-btn" onclick="craftArmadura('crista')">Forjar</button></div>`;
            content.innerHTML += `<div class="shop-item"><div style="color:#ff3300;">👑 Armadura Infernal Suprema (Super Requisitos)</div><button class="buy-btn" onclick="craftInfernalSuprema()">Forjar Suprema</button></div>`;
        }

        function craftArma(key, fe, au, obs, cri) {
            if (minerios.ferro >= fe && minerios.ouro >= au && minerios.cristal >= cri) {
                minerios.ferro -= fe; minerios.ouro -= au; minerios.cristal -= cri;
                player.weapon = key; alert("Arma alterada!"); closeModal(); updateUI();
            } else alert("Faltam recursos!");
        }

        function craftArmaInfernal() {
            if (minerios.cristal_infernal >= 8) { minerios.cristal_infernal -= 8; player.weapon = 'lamina_infernal'; closeModal(); updateUI(); } else alert("Faltam cristais infernais!");
        }

        function craftArmadura(tipo) {
            if(tipo === 'cristal' && minerios.cristal >= 12) { minerios.cristal -= 12; player.armor = 'cristal'; }
            else if(tipo === 'escamas' && dropsMasmorra.escamas >= 10) { dropsMasmorra.escamas -= 10; player.armor = 'escamas'; }
            else if(tipo === 'crista' && minerios.obsidiana >= 5 && minerios.cristal >= 5) { minerios.obsidiana -= 5; minerios.cristal -= 5; player.armor = 'crista'; }
            else { alert("Recursos insuficientes!"); return; }
            closeModal(); updateUI();
        }

        function craftInfernalSuprema() {
            if (minerios.obsidiana >= 10 && minerios.cristal >= 15 && minerios.cristal_infernal >= 15 && minerios.ouro >= 5 && minerios.ferro >= 7 && dropsMasmorra.escamas >= 8) {
                minerios.obsidiana -= 10; minerios.cristal -= 15; minerios.cristal_infernal -= 15; minerios.ouro -= 5; minerios.ferro -= 7; dropsMasmorra.escamas -= 8;
                player.armor = 'infernal_suprema'; alert("Você forjou e equipou a armadura mais poderosa do jogo!"); closeModal(); updateUI();
            } else { alert("Você não possui todos os materiais da receita lendária!"); }
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; currentModalNPC = null; }

        function gameLoop() {
            if (document.activeElement.tagName !== 'INPUT') {
                let speed = getPlayerSpeed();
                if (keysPressed['w'] || keysPressed['arrowup']) player.y -= speed;
                if (keysPressed['s'] || keysPressed['arrowdown']) player.y += speed;
                if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= speed;
                if (keysPressed['d'] || keysPressed['arrowright']) player.x += speed;
            }
            player.x = Math.max(0, Math.min(window.innerWidth - 45, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 120, player.y));
            document.getElementById('player').style.left = player.x+'px';
            document.getElementById('player').style.top = player.y+'px';
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = Math.floor(gameState.coins);
            document.getElementById('hp-bar').style.width = `${Math.max(0, (player.hp / getMaxHp()) * 100)}%`;
            document.getElementById('hp-text').innerText = `HP: ${Math.max(0, Math.floor(player.hp))} / ${getMaxHp()}`;
            document.getElementById('xp-bar').style.width = `${(player.xp / player.nextXp) * 100}%`;
            document.getElementById('xp-text').innerText = `XP: ${player.xp} / ${player.nextXp} (Nível ${player.lvl})`;
            document.getElementById('weapon-status').innerText = arsenal[player.weapon].name + (player.enchantment ? ` (${encantamentos[player.enchantment].name})` : '');
            document.getElementById('armor-status').innerText = armaduras[player.armor].name;
        }

        window.onload = init;
    </script>
</body>
</html>
