<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha Pixel RPG - Ultimate Expansion</title>
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a2e10; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        #ui-top { position: absolute; top: 15px; left: 15px; background: #2c1e14; color: #f4ecd8; padding: 12px; border-radius: 2px; border: 4px solid #6b4c35; z-index: 100; min-width: 340px; box-shadow: 0 6px 0px #140d08; }
        #ui-top h2 { margin: 0 0 6px 0; color: #ffcc00; font-size: 14px; text-align: center; border-bottom: 3px double #4e3522; padding-bottom: 4px; text-transform: uppercase; text-shadow: 2px 2px #000; }
        #ui-top p { margin: 4px 0; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; }
        #shop-timer { color: #ff5555; font-size: 11px; font-weight: bold; margin-top: 6px; text-align: center; background: #140808; padding: 2px; border: 2px solid #4a1515; }
        
        .player-hp-container { margin-bottom: 8px; background: #000; border: 2px solid #444; padding: 2px; height: 20px; position: relative; }
        .player-hp-fill { height: 100%; width: 100%; background: linear-gradient(to bottom, #ff2222, #aa0000); transition: width 0.1s; }
        .player-hp-text { position: absolute; width: 100%; text-align: center; top: 1px; left: 0; font-size: 11px; font-weight: bold; color: #fff; text-shadow: 1px 1px #000; }

        .btn-ui { width: 100%; margin-top: 4px; background: #4a5da3; color: white; border: 2px solid #232e5c; border-bottom-width: 4px; padding: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; text-shadow: 1px 1px #000; }
        .btn-ui:active { border-bottom-width: 2px; margin-top: 6px; margin-bottom: -2px; }
        .btn-land { background: #c27f38; border-color: #6e4215; }

        #adm-trigger { position: absolute; top: 15px; right: 15px; background: #990000; color: #fff; border: 3px solid #ff3333; padding: 8px 12px; font-weight: bold; font-size: 12px; cursor: pointer; z-index: 200; box-shadow: 0 4px 0 #440000; text-transform: uppercase; }
        #adm-panel { display: none; position: absolute; top: 60px; right: 15px; background: #111116; border: 4px solid #ff3333; padding: 12px; z-index: 200; width: 320px; color: #00ff00; box-shadow: 0 6px 12px rgba(0,0,0,0.8); max-height: 85vh; overflow-y: auto; }
        #adm-panel h3 { margin: 0 0 10px 0; font-size: 14px; text-align: center; color: #ff3333; text-transform: uppercase; border-bottom: 2px solid #ff3333; padding-bottom: 4px; }
        .adm-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 11px; gap: 4px; }
        .adm-row label { width: 40%; color: #aaa; }
        .adm-input { width: 60%; background: #222; border: 1px solid #ff3333; color: #00ff00; padding: 3px; font-family: inherit; font-size: 11px; }
        .adm-btn-block { width: 100%; background: #ff3333; color: black; border: none; padding: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: inherit; font-size: 11px; margin-top: 5px; margin-bottom: 5px; }
        .adm-btn-small { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 2px 6px; cursor: pointer; font-size: 10px; }

        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: #18120c; padding: 6px; border: 4px solid #4a3319; z-index: 100; box-shadow: 0 6px 0 #000; }
        .hotbar-slot { width: 54px; height: 54px; background: #362517; border: 3px solid #22160e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.selected { border-color: #ffaa00; background: #4e3522; transform: scale(1.05); }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8c735b; }
        .hotbar-slot .slot-icon { font-size: 20px; margin-top: 2px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 2px; font-size: 10px; color: #ffcc00; font-weight: bold; text-shadow: 1px 1px #000; }
        .hotbar-slot .slot-lvl { position: absolute; top: 1px; right: 2px; font-size: 9px; color: #5cc8ff; font-weight: bold; text-shadow: 1px 1px #000; }

        #game-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #4d7a34; background-image: radial-gradient(#56873b 20%, transparent 20%); background-size: 16px 16px; z-index: 1; }
        #game-canvas.dungeon-mode { background: #1d1d24; background-image: linear-gradient(45deg, #16161c 25%, transparent 25%); background-size: 32px 32px; }
        
        #player { position: absolute; width: 42px; height: 52px; background: linear-gradient(to bottom, #7fa4ff 20%, #ffcc55 20%, #ffcc55 50%, #444 50%, #333 80%); border: 3px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 50; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
        #weapon-render { position: absolute; right: -12px; top: 8px; font-size: 18px; transition: transform 0.1s; transform-origin: bottom left; filter: drop-shadow(2px 2px 0px #000); }

        .character { position: absolute; width: 50px; height: 50px; font-size: 24px; z-index: 10; border: 3px solid #1a110b; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #000; }
        .npc-label { position: absolute; top: -24px; background: #1c120c; color: #f4ecd8; padding: 2px 5px; border: 2px solid #573b24; font-size: 9px; font-weight: bold; white-space: nowrap; }
        
        #farm-zones { position: absolute; top: 160px; left: 340px; display: flex; flex-wrap: wrap; gap: 8px; max-width: calc(100vw - 720px); z-index: 5; }
        .plot { width: 72px; height: 72px; background: #422a18; border: 4px solid #26170c; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 0 4px 6px #000; }
        
        .dungeon-ent { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 20; }
        .dungeon-ent .ent-weapon { position: absolute; right: -8px; bottom: 4px; font-size: 12px; }
        .hp-bar { position: absolute; top: -12px; width: 120%; left: -10%; height: 6px; background: #220000; border: 1px solid #000; }
        .hp-fill { height: 100%; background: #e61919; width: 100%; }

        .projectile { position: absolute; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 60; pointer-events: none; text-shadow: 1px 1px 2px #000; }

        .crop { font-size: 30px; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; }
        .crop.growing { filter: grayscale(80%) brightness(40%) scale(0.6) !important; animation: none !important; }
        
        /* Sistema de Estilos das Mutações */
        .m-golden { filter: drop-shadow(0px 0px 5px #ffd700) brightness(1.2); }
        .m-frozen { filter: drop-shadow(0px 0px 5px #70c5ff) hue-rotate(140deg); }
        .m-divine { filter: drop-shadow(0px 0px 8px #ff00ff) brightness(1.3); }
        .m-radioactive { filter: drop-shadow(0px 0px 6px #39ff14) saturate(2); }
        .m-infernal { filter: drop-shadow(0px 0px 6px #ff3300) contrast(1.3); }
        .m-cosmic { filter: drop-shadow(0px 0px 8px #00ffff) hue-rotate(240deg); }
        .m-cyber { filter: drop-shadow(0px 0px 5px #00f0ff); skewX: 5deg; }
        .m-void { filter: drop-shadow(0px 0px 8px #4a0099) brightness(0.4); }
        .m-chrono { filter: drop-shadow(0px 0px 6px #ffcc00) sepia(0.4); }
        .m-quantum { filter: drop-shadow(0px 0px 10px #ffffff) invert(0.1); }
        
        .timer-bar { position: absolute; bottom: 4px; left: 4px; width: calc(100% - 8px); height: 5px; background: #111; }
        .timer-fill { height: 100%; width: 0%; background: #38b349; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #291c12; border: 4px solid #543a24; padding: 18px; z-index: 200; width: 92%; max-width: 560px; box-shadow: 0 10px 0px #000; color: #f4ecd8; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #402b1b; padding-bottom: 6px; margin-bottom: 10px; }
        .modal-header h3 { margin: 0; color: #ffcc00; font-size: 13px; text-transform: uppercase; }
        .close-btn { background: #912323; color: white; border: 2px solid #4a1212; padding: 3px 8px; cursor: pointer; font-family: inherit; font-weight: bold; }
        
        .shop-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 5px; background: #3d281a; border: 2px solid #1a100a; color: #bfaea0; cursor: pointer; font-size: 11px; font-family: inherit; text-transform: uppercase; }
        .tab-btn.active { background: #735135; color: #fff; border-color: #ffaa00; }

        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 5px; max-height: 50vh; overflow-y: auto; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border: 2px solid #3d281a; background: #21160e; }
        .item-info { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .buy-btn { background: #2b5c16; color: white; border: 2px solid #142e09; border-bottom-width: 3px; padding: 4px 8px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 11px; }
        .buy-btn:disabled { background: #3a3a3a; border-color: #111; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>Fazenda Retrô Agrinho</h2>
        <div class="player-hp-container">
            <div id="hp-bar" class="player-hp-fill"></div>
            <div id="hp-text" class="player-hp-text">HP: 100 / 100</div>
        </div>
        <p><span>🪙 Moedas:</span> <span id="coin-count">150</span></p>
        <p><span>⚔️ Arma:</span> <span id="weapon-status" style="color: #ffaa00;">Espada de Ferro</span></p>
        <p><span>🌱 Item Ativo:</span> <span id="selected-seed-text">Nenhum</span></p>
        <button class="btn-ui" onclick="openBackpackModal()">🎒 Mochila & Forja [Espaço]</button>
        <button class="btn-ui btn-land" id="btn-buy-plot" onclick="buyNewPlot()">🟫 Expandir Lote (<span id="plot-cost">200</span> 🪙)</button>
        <div id="shop-timer">Loja reestoca em: 03:00</div>
    </div>

    <button id="adm-trigger" onclick="tryAccessAdm()">🛠️ Painel ADM</button>
    <div id="adm-panel">
        <h3>Menu Deus Hack v4.0</h3>
        <button class="adm-btn-block" style="background:#00ff00; color:#000;" onclick="aplicarAlteracoesADM()">⚡ Aplicar Modificações</button>
        <div class="adm-row"><label>🪙 Moedas:</label><input type="number" id="adm-coins" class="adm-input" value="150"></div>
        <div class="adm-row"><label>❤️ HP Atual:</label><input type="number" id="adm-hp" class="adm-input" value="100"></div>
        <div class="adm-row"><label>❤️ HP Máximo:</label><input type="number" id="adm-maxhp" class="adm-input" value="100"></div>
        <div class="adm-row"><label>⚔️ Dano Atual:</label><input type="number" id="adm-dmg" class="adm-input" value="18"></div>
        <div class="adm-row"><label>😈 Andar Masmorra:</label><input type="number" id="adm-floor" class="adm-input" value="1"></div>
        <div class="adm-row"><label>🟫 Qtd Lotes:</label><input type="number" id="adm-plots" class="adm-input" value="6"></div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 250px; left: 200px;">🤠<div id="weapon-render">⚔️</div></div>
        <div id="npc-tiao" class="character" style="top: 25px; left: 360px; background: #2f4560;">🏪<span class="npc-label">Tião [E]</span></div>
        <div id="npc-mago" class="character" style="top: 25px; left: 540px; background: #50287a;">🧙‍♂️<span class="npc-label">Mago [E]</span></div>
        <div id="npc-chico" class="character" style="top: 25px; left: 720px; background: #7a431d;">👨‍💼<span class="npc-label">Chico [E]</span></div>
        <div id="npc-dungeon" class="character" style="top: 450px; left: 1100px; background: #14111f; border-color: #991b1b;">😈<span class="npc-label" style="border-color:#b91c1c; color:#f87171;">Masmorra [E]</span></div>
        
        <div id="farm-zones"></div>
        <div id="dungeon-entities-layer"></div>
        <div id="projectiles-layer"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header"><h3 id="modal-title">Painel</h3><button class="close-btn" onclick="closeModal()">X</button></div>
        <div class="shop-tabs" id="modal-tabs"></div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        let player = { x: 200, y: 250, speed: 5, inDungeon: false, weapon: 'espada', hp: 100, maxHp: 100 };
        let gameState = { coins: 150, maxPlots: 4, speedMultiplier: 1.0, permanentMutationChance: 0.0, activeHotbarSlot: 0, godMode: false, currentMutationAltar: null, potionTimer: 0 };
        
        let arsenal = {
            espada: { name: "Espada de Ferro", icon: "⚔️", damage: 18, range: 70, speed: 200, ranged: false },
            lança: { name: "Lança Pontuda", icon: "🔱", damage: 22, range: 120, speed: 380, ranged: false },
            arco: { name: "Arco de Caça", icon: "🏹", damage: 14, range: 400, speed: 600, ranged: true },
            picareta: { name: "Picareta Rústica", icon: "⛏️", damage: 14, range: 60, speed: 250, ranged: false }
        };

        let minerios = { ferro: 0, ouro: 0 };
        let backpack = {};
        let hotbar = Array(8).fill(null).map(() => ({ id: null, qty: 0, type: '', level: 0, data: null }));

        let dungeon = { floor: 1, entities: [] };
        let projectiles = [];
        let keysPressed = {};
        
        // ESTOQUE DINÂMICO DA LOJA DO TIÃO
        let shopStock = {};
        let shopTimer = 180;
        let plots = [];
        let attackCooldown = false;
        let currentModalNPC = null;

        const fruitData = {
            maca: { name: "Maçã", icon: "🍎", basePrice: 15, time: 4, weightMin: 0.3 },
            banana: { name: "Banana", icon: "🍌", basePrice: 20, time: 6, weightMin: 0.2 },
            cenoura: { name: "Cenoura", icon: "🥕", basePrice: 22, time: 5, weightMin: 0.15 },
            laranja: { name: "Laranja", icon: "🍊", basePrice: 25, time: 8, weightMin: 0.4 },
            coco: { name: "Coco", icon: "🥥", basePrice: 35, time: 12, weightMin: 0.8 },
            abacaxi: { name: "Abacaxi", icon: "🍍", basePrice: 45, time: 15, weightMin: 1.2 },
            manga: { name: "Manga", icon: "🥭", basePrice: 55, time: 14, weightMin: 0.6 },
            estrela: { name: "Fruta Estrela", icon: "⭐", basePrice: 150, time: 35, weightMin: 0.3 },
            divina: { name: "Divindade Mítica", icon: "👑", basePrice: 400, time: 50, weightMin: 1.0 }
        };

        const mutationConfig = {
            golden: { label: "Dourada ✨", mult: 3.0, class: "m-golden" },
            frozen: { label: "Congelada ❄️", mult: 2.2, class: "m-frozen" },
            divine: { label: "Divina 🌌", mult: 6.0, class: "m-divine" },
            radioactive: { label: "Radioativa ☢️", mult: 4.5, class: "m-radioactive" },
            infernal: { label: "Infernal 🔥", mult: 7.0, class: "m-infernal" },
            cosmic: { label: "Cósmica 🪐", mult: 12.0, class: "m-cosmic" },
            cyber: { label: "Cibernética ⚡", mult: 3.5, class: "m-cyber" },
            void: { label: "Abissal 🔮", mult: 9.5, class: "m-void" },
            chrono: { label: "Temporal ⏳", mult: 5.0, class: "m-chrono" },
            quantum: { label: "Quântica ⚛️", mult: 15.0, class: "m-quantum" }
        };

        const fertData = {
            grow_fertilizer: { name: "Fertilizante Sônico", icon: "🧪", price: 20 },
            gold_fertilizer: { name: "Néctar de Ouro", icon: "✨", price: 45 }
        };

        const mageAltars = {
            altar_comum: { name: "Altar Elemental", desc: "Permite mutações Congeladas/Douradas/Cyber", price: 120, mutations: ['frozen', 'golden', 'cyber'] },
            altar_caos: { name: "Altar do Caos", desc: "Permite mutações Radioativas/Infernais/Temporais", price: 300, mutations: ['radioactive', 'infernal', 'chrono'] },
            altar_vortex: { name: "Altar do Vórtice Supremo", desc: "Desbloqueia as lendárias Cósmica, Abissal, Divina e Quântica!", price: 750, mutations: ['cosmic', 'void', 'divine', 'quantum'] }
        };

        const magePotions = {
            potion_luck: { name: "Poção da Sorte Pura", desc: "Garante +35% de chance de rolar mutações extras por 60s", price: 80 }
        };

        function init() {
            createPlots();
            refreshShopSeeds();
            updateUI();
            updateHotbarVisuals();

            // Loop de Cronômetros
            setInterval(() => {
                if (shopTimer > 0) shopTimer--;
                else { refreshShopSeeds(); shopTimer = 180; }
                let mins = Math.floor(shopTimer / 60), secs = shopTimer % 60;
                document.getElementById('shop-timer').innerText = `Loja reestoca em: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (gameState.potionTimer > 0) gameState.potionTimer--;
            }, 1000);

            // Loop de Crescimento e Projéteis
            setInterval(() => {
                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= 0.1;
                        let totalTime = fruitData[plot.fruit].time * (1 - ((plot.seedLevel - 1) * 0.08));
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;

                        if (plot.timer <= 0) {
                            plot.status = 'ready';
                            renderPlotAsset(plot);
                        }
                    }
                });

                if (player.inDungeon) {
                    dungeonLogicUpdate();
                    projectilesUpdate();
                }
            }, 100);

            // Clique do Mouse na Masmorra
            document.getElementById('game-canvas').addEventListener('mousedown', (e) => {
                if (player.inDungeon) {
                    executeAttack(e.clientX, e.clientY);
                }
            });

            window.addEventListener('keydown', e => {
                if (document.activeElement.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); if (currentModalNPC === 'mochila') closeModal(); else openBackpackModal(); }
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
            });

            gameLoop();
        }

        function tryAccessAdm() {
            let pass = prompt("Digite a senha de administrador:");
            if (pass === "agrinho2026") {
                let panel = document.getElementById('adm-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                syncAdmPanelInputs();
            } else {
                alert("❌ Senha Incorreta!");
            }
        }

        function syncAdmPanelInputs() {
            document.getElementById('adm-coins').value = Math.floor(gameState.coins);
            document.getElementById('adm-hp').value = Math.floor(player.hp);
            document.getElementById('adm-maxhp').value = player.maxHp;
            document.getElementById('adm-dmg').value = arsenal[player.weapon].damage;
            document.getElementById('adm-floor').value = dungeon.floor;
            document.getElementById('adm-plots').value = gameState.maxPlots;
        }

        function aplicarAlteracoesADM() {
            gameState.coins = parseFloat(document.getElementById('adm-coins').value) || 0;
            player.maxHp = parseInt(document.getElementById('adm-maxhp').value) || 100;
            player.hp = Math.min(parseInt(document.getElementById('adm-hp').value) || 100, player.maxHp);
            arsenal[player.weapon].damage = parseInt(document.getElementById('adm-dmg').value) || 1;
            gameState.maxPlots = Math.min(parseInt(document.getElementById('adm-plots').value) || 4, 15);
            createPlots();
            updateUI();
        }

        function buyNewPlot() {
            let cost = 200 + (gameState.maxPlots * 150);
            if (gameState.coins >= cost) {
                gameState.coins -= cost;
                gameState.maxPlots++;
                createPlots();
                updateUI();
            } else {
                alert("🪙 Moedas insuficientes para expandir terreno!");
            }
        }

        function createPlots() {
            const container = document.getElementById('farm-zones');
            container.innerHTML = '';
            let oldPlots = [...plots];
            plots = [];

            for(let i = 0; i < gameState.maxPlots; i++) {
                let plotDiv = document.createElement('div');
                plotDiv.className = 'plot';
                container.appendChild(plotDiv);

                if (oldPlots[i]) {
                    plots.push(oldPlots[i]); plots[i].element = plotDiv;
                    if (plots[i].status !== 'empty') renderPlotAsset(plots[i]);
                } else {
                    plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutations: [], weight: 1.0, seedLevel: 1 });
                    plotDiv.innerHTML = `<span style="color:#26170c; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
            document.getElementById('plot-cost').innerText = 200 + (gameState.maxPlots * 150);
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit];
            plot.element.innerHTML = '';
            
            let cropDiv = document.createElement('div');
            cropDiv.className = `crop ${plot.status === 'growing' ? 'growing' : ''}`;
            cropDiv.innerText = data.icon;
            
            // Aplica classes de todas as mutações ativas no asset visual simultaneamente
            if (plot.status === 'ready') {
                plot.mutations.forEach(m => cropDiv.classList.add(mutationConfig[m].class));
            }
            
            plot.element.appendChild(cropDiv);
            plot.element.innerHTML += `<span style="color:#26170c; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Lvl ${plot.seedLevel}</span>`;
            
            if (plot.status === 'growing') {
                let timerBar = document.createElement('div');
                timerBar.className = 'timer-bar';
                timerBar.innerHTML = `<div class="timer-fill"></div>`;
                plot.element.appendChild(timerBar);
            }
        }

        function refreshShopSeeds() {
            Object.keys(fruitData).forEach(key => {
                shopStock[key] = Math.floor(Math.random() * 5) + 2; // Quantidade aleatória entre 2 e 6 unidades
            });
            if(currentModalNPC === 'tiao') renderTiaoShop('seeds');
        }

        function selectSlot(index) {
            gameState.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`);
                let item = hotbar[i];
                if (item && item.id) {
                    slot.querySelector('.slot-icon').innerText = item.data?.icon || fruitData[item.id.split('_')[0]]?.icon || "❓";
                    slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                    slot.querySelector('.slot-lvl').innerText = item.type === 'semente' ? "L." + item.level : "";
                } else {
                    slot.querySelector('.slot-icon').innerText = '';
                    slot.querySelector('.slot-qty').innerText = '';
                    slot.querySelector('.slot-lvl').innerText = '';
                }
            }
        }

        // SISTEMA ANTIBUG: Mutações guardadas separadas por assinatura única de mutações na hotbar
        function addItemToCollectedHotbar(itemKey, type, level, dataBlock) {
            let signature = dataBlock && dataBlock.mutations ? dataBlock.mutations.join('-') : 'none';
            let inserido = false;

            for (let i = 0; i < 8; i++) {
                let slotSig = hotbar[i].data && hotbar[i].data.mutations ? hotbar[i].data.mutations.join('-') : 'none';
                if (hotbar[i].id === itemKey && hotbar[i].type === type && hotbar[i].level === level && slotSig === signature) {
                    hotbar[i].qty++;
                    inserido = true; break;
                }
            }
            if(!inserido) {
                for (let i = 0; i < 8; i++) {
                    if (hotbar[i].id === null) {
                        hotbar[i].id = itemKey;
                        hotbar[i].qty = 1;
                        hotbar[i].type = type;
                        hotbar[i].level = level;
                        hotbar[i].data = dataBlock ? { ...dataBlock } : null;
                        inserido = true; break;
                    }
                }
            }
            updateHotbarVisuals();
        }

        function handlePlotInteraction(index) {
            if (player.inDungeon) return;
            let plot = plots[index];
            let activeItem = hotbar[gameState.activeHotbarSlot];

            if (plot.status === 'empty' && activeItem && activeItem.type === 'semente' && activeItem.qty > 0) {
                plot.status = 'growing';
                plot.fruit = activeItem.id.split('_')[0];
                plot.seedLevel = activeItem.level;
                plot.timer = fruitData[plot.fruit].time * (1 - ((plot.seedLevel - 1) * 0.08));
                plot.mutations = [];

                // Lógica de Múltiplas Mutações Baseadas no Altar Comprado do Mago
                if (gameState.currentMutationAltar) {
                    let pool = mageAltars[gameState.currentMutationAltar].mutations;
                    let chance = 0.35 + (gameState.potionTimer > 0 ? 0.35 : 0);
                    
                    pool.forEach(mut => {
                        if (Math.random() < chance) {
                            plot.mutations.push(mut); // Pode adicionar várias se tiver sorte!
                        }
                    });
                }

                plot.weight = (Math.random() * 1.2 + fruitData[plot.fruit].weightMin);
                activeItem.qty--;
                if (activeItem.qty <= 0) hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', level: 0, data: null };

                renderPlotAsset(plot);
                updateUI();
                updateHotbarVisuals();
            } 
            else if (plot.status === 'ready') {
                let finalMult = 1.0 + (plot.seedLevel * 0.3);
                let labels = [];

                plot.mutations.forEach(m => {
                    finalMult *= mutationConfig[m].mult;
                    labels.push(mutationConfig[m].label);
                });

                let calculatedPrice = fruitData[plot.fruit].basePrice * finalMult * plot.weight;
                let finalName = `${fruitData[plot.fruit].name} ${labels.length > 0 ? '[' + labels.join('+') + ']' : ''}`;

                addItemToCollectedHotbar(`${plot.fruit}_fruta`, 'fruta', 1, {
                    icon: fruitData[plot.fruit].icon,
                    price: calculatedPrice,
                    fullName: finalName,
                    mutations: [...plot.mutations]
                });

                plot.status = 'empty'; plot.fruit = null; plot.mutations = [];
                plot.element.innerHTML = `<span style="color:#26170c; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                updateUI();
            }
        }

        function executeAttack(targetX = null, targetY = null) {
            if (attackCooldown) return;
            attackCooldown = true;
            
            let wep = arsenal[player.weapon];
            let renderWeapon = document.getElementById('weapon-render');
            renderWeapon.style.transform = "rotate(-75deg)";
            
            setTimeout(() => { renderWeapon.style.transform = "rotate(0deg)"; attackCooldown = false; }, wep.speed);

            if (!player.inDungeon) return;

            if (wep.ranged && targetX && targetY) {
                // Dispara projétil real do arco do jogador para onde clicou
                spawnProjectile(player.x + 20, player.y + 25, targetX, targetY, 8, "🏹", false, wep.damage);
            } else {
                // Ataque corpo a corpo tradicional
                dungeon.entities.forEach((ent) => {
                    let dist = Math.sqrt(Math.pow(player.x - ent.x, 2) + Math.pow(player.y - ent.y, 2));
                    if (dist <= wep.range) {
                        ent.hp -= wep.damage;
                        let pct = Math.max(0, (ent.hp / ent.maxHp) * 100);
                        let fillBar = ent.el.querySelector('.hp-fill');
                        if (fillBar) fillBar.style.width = `${pct}%`;
                        if (ent.hp <= 0) handleEntityDeath(ent);
                    }
                });
                dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
                checkDungeonFloorClear();
            }
        }

        function spawnProjectile(x, y, tx, ty, speed, icon, isEnemy = true, damage = 10) {
            let layer = document.getElementById('projectiles-layer');
            let el = document.createElement('div');
            el.className = "projectile"; el.innerText = icon;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            layer.appendChild(el);

            let dx = tx - x; let dy = ty - y; let dist = Math.sqrt(dx*dx + dy*dy);
            projectiles.push({ el, x, y, vx: (dx / dist) * speed, vy: (dy / dist) * speed, isEnemy, damage });
        }

        function projectilesUpdate() {
            projectiles.forEach((proj, idx) => {
                proj.x += proj.vx; proj.y += proj.vy;
                proj.el.style.left = proj.x + 'px'; proj.el.style.top = proj.y + 'px';

                if (proj.isEnemy) {
                    let pDist = Math.sqrt(Math.pow(player.x - proj.x, 2) + Math.pow(player.y - proj.y, 2));
                    if (pDist < 25) {
                        if (!gameState.godMode) player.hp -= proj.damage || 6;
                        proj.el.remove(); projectiles.splice(idx, 1);
                        if (player.hp <= 0) handlePlayerDefeat();
                        updateUI();
                    }
                } else {
                    // Colisão de projéteis do jogador contra inimigos
                    dungeon.entities.forEach(ent => {
                        let eDist = Math.sqrt(Math.pow(ent.x - proj.x, 2) + Math.pow(ent.y - proj.y, 2));
                        if (eDist < 30) {
                            ent.hp -= proj.damage;
                            let pct = Math.max(0, (ent.hp / ent.maxHp) * 100);
                            let fillBar = ent.el.querySelector('.hp-fill');
                            if (fillBar) fillBar.style.width = `${pct}%`;
                            
                            proj.el.remove(); projectiles.splice(idx, 1);
                            if (ent.hp <= 0) handleEntityDeath(ent);
                        }
                    });
                    dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
                    checkDungeonFloorClear();
                }
            });
        }

        function handleEntityDeath(ent) {
            if (ent.el) ent.el.remove();
            if (ent.type === 'minerio') {
                if (ent.kind === 'ferro') minerios.ferro += 3;
                if (ent.kind === 'ouro') minerios.ouro += 1;
            } else {
                gameState.coins += ent.isBoss ? 200 : 15;
            }
            updateUI();
        }

        function enterDungeon() {
            player.inDungeon = true;
            document.getElementById('game-canvas').classList.add('dungeon-mode');
            document.getElementById('farm-zones').style.display = 'none';
            document.getElementById('npc-tiao').style.display = 'none';
            document.getElementById('npc-mago').style.display = 'none';
            document.getElementById('npc-chico').style.display = 'none';
            generateDungeonFloor();
            updateUI();
        }

        function exitDungeon() {
            player.inDungeon = false;
            document.getElementById('game-canvas').classList.remove('dungeon-mode');
            document.getElementById('farm-zones').style.display = 'flex';
            document.getElementById('npc-tiao').style.display = 'flex';
            document.getElementById('npc-mago').style.display = 'flex';
            document.getElementById('npc-chico').style.display = 'flex';
            document.getElementById('dungeon-entities-layer').innerHTML = '';
            document.getElementById('projectiles-layer').innerHTML = '';
            dungeon.entities = []; projectiles = [];
            updateUI();
        }

        function generateDungeonFloor() {
            let layer = document.getElementById('dungeon-entities-layer'); layer.innerHTML = ''; dungeon.entities = [];
            let mobCount = 3 + Math.floor(dungeon.floor / 2);
            for (let i = 0; i < Math.min(mobCount, 6); i++) {
                let rx = Math.random() * 600 + 350; let ry = Math.random() * 300 + 160;
                spawnEntity('Monstro Masmorra', rx, ry, 25 + (dungeon.floor * 5), "💀", false, Math.random() > 0.5 ? 'arco' : '');
            }
        }

        function spawnEntity(name, x, y, hp, icon, isBoss = false, weaponType = '') {
            let layer = document.getElementById('dungeon-entities-layer');
            let el = document.createElement('div'); el.className = "dungeon-ent";
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.innerHTML = `${icon} <div class="hp-bar"><div class="hp-fill"></div></div>`;
            layer.appendChild(el);
            dungeon.entities.push({ name, x, y, hp, maxHp: hp, el, isBoss, weaponType, type: 'mob', cooldown: 0 });
        }

        function dungeonLogicUpdate() {
            dungeon.entities.forEach(ent => {
                let dx = player.x - ent.x; let dy = player.y - ent.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 15 && dist < 300) {
                    ent.x += (dx / dist) * 1.8; ent.y += (dy / dist) * 1.8;
                    ent.el.style.left = ent.x + 'px'; ent.el.style.top = ent.y + 'px';
                }
                if (ent.weaponType === 'arco' && dist < 200 && Math.random() < 0.03) {
                    spawnProjectile(ent.x, ent.y, player.x, player.y, 4, "🏹", true, 8);
                }
                if (dist < 30 && !gameState.godMode) {
                    player.hp -= 1; if (player.hp <= 0) handlePlayerDefeat();
                    updateUI();
                }
            });
        }

        function handlePlayerDefeat() { alert("💔 Desmaiou!"); exitDungeon(); player.hp = player.maxHp; updateUI(); }
        function checkDungeonFloorClear() {
            if (dungeon.entities.length === 0) { dungeon.floor++; alert(`Andar ${dungeon.floor}`); generateDungeonFloor(); }
        }

        function handleNPCDetection() {
            if (player.inDungeon) { exitDungeon(); return; }
            if (Math.sqrt(Math.pow(player.x - 360, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('tiao');
            else if (Math.sqrt(Math.pow(player.x - 540, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('mago');
            else if (Math.sqrt(Math.pow(player.x - 720, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('chico');
            else if (Math.sqrt(Math.pow(player.x - 1100, 2) + Math.pow(player.y - 450, 2)) < 65) enterDungeon();
        }

        function openNPCModal(npcType) {
            let modal = document.getElementById('game-modal'); let tabs = document.getElementById('modal-tabs');
            modal.style.display = 'block'; tabs.innerHTML = ''; currentModalNPC = npcType;

            if (npcType === 'tiao') {
                document.getElementById('modal-title').innerText = "Mercado do Seu Tião";
                tabs.innerHTML = `<button class="tab-btn active" onclick="renderTiaoShop('seeds')">🌱 Sementes</button><button class="tab-btn" onclick="renderTiaoShop('fert')">🧪 Adubos</button>`;
                renderTiaoShop('seeds');
            } else if (npcType === 'mago') {
                document.getElementById('modal-title').innerText = "Altar Arcano do Mago";
                tabs.innerHTML = `<button class="tab-btn active" onclick="renderMagoShop('level')">🔮 Subir Nível</button><button class="tab-btn" onclick="renderMagoShop('altars')">🏛️ Altares</button><button class="tab-btn" onclick="renderMagoShop('potions')">🧪 Poções</button>`;
                renderMagoShop('level');
            } else if (npcType === 'chico') {
                document.getElementById('modal-title').innerText = "Seu Chico Comprador"; renderChicoShop();
            }
        }

        function renderTiaoShop(section) {
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            if (section === 'seeds') {
                Object.keys(shopStock).forEach(k => {
                    let cost = Math.floor(fruitData[k].basePrice * 0.4);
                    let qty = shopStock[k];
                    content.innerHTML += `
                        <div class="shop-item">
                            <div class="item-info"><span>${fruitData[k].icon}</span> <b>Semente de ${fruitData[k].name}</b> <span style="color:#ffcc00;">[Estoque: ${qty}]</span></div>
                            <button class="buy-btn" ${qty <= 0 ? 'disabled' : ''} onclick="buySeed('${k}', ${cost})">${qty > 0 ? 'Comprar ('+cost+'🪙)' : 'Esgotado'}</button>
                        </div>`;
                });
            } else {
                Object.keys(fertData).forEach(key => {
                    content.innerHTML += `
                        <div class="shop-item">
                            <div class="item-info"><b>${fertData[key].name}</b></div>
                            <button class="buy-btn" onclick="buyItem('fert','${key}',${fertData[key].price})">Comprar (${fertData[key].price}🪙)</button>
                        </div>`;
                });
            }
        }

        function buySeed(key, cost) {
            if (gameState.coins >= cost && shopStock[key] > 0) {
                shopStock[key]--;
                gameState.coins -= cost;
                addItemToCollectedHotbar(`${key}_semente`, 'semente', 1, null);
                renderTiaoShop('seeds');
                updateUI();
            }
        }

        function buyItem(type, key, cost) {
            if (gameState.coins >= cost) {
                gameState.coins -= cost;
                addItemToCollectedHotbar(key, type === 'fert' ? 'fertilizante' : '', 1, null);
                updateUI();
            }
        }

        function renderMagoShop(section) {
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            let activeItem = hotbar[gameState.activeHotbarSlot];

            if (section === 'level') {
                if (activeItem && activeItem.type === 'semente') {
                    if (activeItem.level >= 10) {
                        content.innerHTML = "<p style='color:#00ff00;'>Semente no nível Máximo (Lvl 10)!</p>";
                    } else {
                        let cost = activeItem.level * 45;
                        content.innerHTML = `<div class="shop-item"><div class="item-info">🔮 Subir Semente para Lvl ${activeItem.level+1}</div><button class="buy-btn" onclick="upgradeSeed(${cost})">Melhorar (${cost}🪙)</button></div>`;
                    }
                } else {
                    content.innerHTML = "<p style='color:#ff5555;'>Segure um pacote de sementes na barra para subir de nível!</p>";
                }
            } else if (section === 'altars') {
                Object.keys(mageAltars).forEach(key => {
                    let a = mageAltars[key];
                    let active = gameState.currentMutationAltar === key ? "🔮 ATIVO" : `Sintonizar (${a.price}🪙)`;
                    content.innerHTML += `<div class="shop-item"><div class="item-info"><b>${a.name}</b><br><small>${a.desc}</small></div><button class="buy-btn" ${gameState.currentMutationAltar === key ? 'disabled' : ''} onclick="buyAltar('${key}', ${a.price})">${active}</button></div>`;
                });
            } else if (section === 'potions') {
                Object.keys(magePotions).forEach(key => {
                    let p = magePotions[key];
                    content.innerHTML += `<div class="shop-item"><div class="item-info"><b>${p.name}</b><br><small>${p.desc}</small></div><button class="buy-btn" onclick="buyPotion('${key}', ${p.price})">Beber (${p.price}🪙)</button></div>`;
                });
            }
        }

        function upgradeSeed(cost) {
            let activeItem = hotbar[gameState.activeHotbarSlot];
            if (gameState.coins >= cost && activeItem.level < 10) {
                gameState.coins -= cost; activeItem.level++;
                updateUI(); renderMagoShop('level');
            }
        }

        function buyAltar(key, price) {
            if (gameState.coins >= price) {
                gameState.coins -= price; gameState.currentMutationAltar = key;
                alert(`Sintonizado com o ${mageAltars[key].name}! Suas sementes agora herdarão mutações deste altar.`);
                closeModal(); updateUI();
            }
        }

        function buyPotion(key, price) {
            if (gameState.coins >= price) {
                gameState.coins -= price; gameState.potionTimer = 60;
                alert("✨ Você tomou a Poção! Suas chances de mutação múltipla aumentaram drasticamente pelos próximos 60 segundos!");
                closeModal(); updateUI();
            }
        }

        function openBackpackModal() {
            let modal = document.getElementById('game-modal'); modal.style.display = 'block'; currentModalNPC = 'mochila';
            document.getElementById('modal-title').innerText = "🎒 Mochila & Forja";
            document.getElementById('modal-tabs').innerHTML = `<button class="tab-btn active" onclick="renderInventoryTab()">🎒 Inventário</button><button class="tab-btn" onclick="renderForgeTab()">🔨 Bigorna</button>`;
            renderInventoryTab();
        }

        function renderInventoryTab() {
            let content = document.getElementById('modal-content');
            content.innerHTML = `<p style='color:#ffd700; margin:0;'>🪨 Ferro: ${minerios.ferro} | ✨ Ouro: ${minerios.ouro}</p><hr style='border-color:#402b1b;'>`;
            let empty = true;
            hotbar.forEach(item => {
                if (item.id && item.type === 'fruta') {
                    empty = false;
                    content.innerHTML += `<div class="shop-item"><div class="item-info">${item.data.fullName} (x${item.qty})</div></div>`;
                }
            });
            if(empty) content.innerHTML += "<p style='font-size:11px; color:#aaa;'>Nenhuma fruta na mochila.</p>";
        }

        function renderForgeTab() {
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            Object.keys(arsenal).forEach(key => {
                content.innerHTML += `<div class="shop-item"><div class="item-info"><b>${arsenal[key].icon} ${arsenal[key].name}</b></div><button class="buy-btn" onclick="equipWeapon('${key}')">Equipar</button></div>`;
            });
        }

        function equipWeapon(key) {
            player.weapon = key;
            document.getElementById('weapon-render').innerText = arsenal[key].icon;
            document.getElementById('weapon-status').innerText = arsenal[key].name;
            closeModal(); updateUI();
        }

        function renderChicoShop() {
            let content = document.getElementById('modal-content'); let profit = 0;
            for (let i = 0; i < 8; i++) { if (hotbar[i] && hotbar[i].type === 'fruta') profit += hotbar[i].data.price * hotbar[i].qty; }
            content.innerHTML = `<div style="text-align:center;"><p>Valor total de venda da hotbar: <b>${Math.floor(profit)} Moedas</b></p><button class="buy-btn" onclick="chicoVenda(${profit})">Vender Carga de Frutas</button></div>`;
        }

        function chicoVenda(profit) {
            for (let i = 0; i < 8; i++) { if (hotbar[i] && hotbar[i].type === 'fruta') hotbar[i] = { id: null, qty: 0, type: '', level: 0, data: null }; }
            gameState.coins += profit; updateUI(); updateHotbarVisuals(); closeModal();
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; currentModalNPC = null; }

        function gameLoop() {
            let sp = player.speed;
            if(document.activeElement.tagName !== 'INPUT') {
                if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= sp;
                if (keysPressed['d'] || keysPressed['arrowright']) player.x += sp;
                if (keysPressed['w'] || keysPressed['arrowup']) player.y -= sp;
                if (keysPressed['s'] || keysPressed['arrowdown']) player.y += sp;
            }
            player.x = Math.max(0, Math.min(window.innerWidth - 45, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 135, player.y));
            document.getElementById('player').style.left = player.x + 'px';
            document.getElementById('player').style.top = player.y + 'px';
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = Math.floor(gameState.coins);
            document.getElementById('hp-bar').style.width = `${(player.hp / player.maxHp) * 100}%`;
            document.getElementById('hp-text').innerText = `HP: ${Math.max(0, Math.floor(player.hp))} / ${player.maxHp}`;
            
            let item = hotbar[gameState.activeHotbarSlot];
            document.getElementById('selected-seed-text').innerText = item && item.id ? (item.type === 'semente' ? `${item.id.split('_')[0]} Lvl.${item.level}` : item.data?.fullName || item.id) : "Mão Vazia";
        }

        window.onload = init;
    </script>
</body>
</html>
