<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha do Agrinho - RPG & Dungeon Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; background-color: #244414; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* UI Superior */
        #ui-top { position: absolute; top: 15px; left: 15px; background: #1a1510; color: #f4ecd8; padding: 12px; border-radius: 4px; border: 4px solid #b8860b; z-index: 100; min-width: 300px; box-shadow: 0 6px 0px #0c0a07; }
        #ui-top h2 { margin: 0 0 8px 0; color: #ffcc00; font-size: 16px; text-align: center; border-bottom: 2px dashed #443322; padding-bottom: 5px; text-transform: uppercase; }
        #ui-top p { margin: 5px 0; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; }
        #shop-timer { color: #ff4444; font-size: 11px; font-weight: bold; margin-top: 6px; text-align: center; background: #2a1111; padding: 2px; border: 1px solid #551111; }
        #active-buffs { margin-top: 6px; font-size: 11px; color: #5cc8ff; line-height: 1.3; }
        
        .btn-mochila { width: 100%; margin-top: 8px; background: #3a5fcd; color: white; border: 2px solid #284291; border-bottom-width: 4px; padding: 6px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; font-family: inherit; }
        .btn-mochila:active { border-bottom-width: 2px; margin-top: 10px; margin-bottom: -2px; }

        /* Hotbar */
        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: #221a15; padding: 8px; border: 4px solid #553311; border-radius: 2px; z-index: 100; box-shadow: 0 6px 0 #0c0a07; }
        .hotbar-slot { width: 55px; height: 55px; background: #3d2d22; border: 3px solid #1f140e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.selected { border-color: #ffd700; background: #5a4535; transform: scale(1.05); }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 3px; font-size: 9px; color: #887766; }
        .hotbar-slot .slot-icon { font-size: 22px; margin-top: 2px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 3px; font-size: 10px; color: #ffd700; font-weight: bold; }
        .hotbar-slot .slot-lvl { position: absolute; top: 1px; right: 3px; font-size: 9px; color: #5cc8ff; font-weight: bold; }

        /* Cenários */
        #game-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #346c24; background-size: 32px 32px; background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px); z-index: 1; }
        #game-canvas.dungeon-mode { background: #16161a; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); }
        
        /* Personagem e Atacante */
        #player { position: absolute; width: 44px; height: 44px; background-color: #ffcc00; border: 3px solid #1a1510; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 50; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        #weapon-render { position: absolute; right: -15px; top: -5px; font-size: 18px; transition: transform 0.1s; transform-origin: bottom left; }

        /* Estruturas e Mundos */
        .character { position: absolute; width: 52px; height: 52px; font-size: 26px; z-index: 10; border: 3px solid #1a1510; border-radius: 4px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .npc-label { position: absolute; top: -26px; background: #1a1510; color: #f4ecd8; padding: 2px 6px; border: 2px solid #b8860b; font-size: 9px; font-weight: bold; white-space: nowrap; }
        
        /* Lotes Agrícolas */
        #farm-zones { position: absolute; top: 160px; left: 340px; display: flex; flex-wrap: wrap; gap: 10px; max-width: calc(100vw - 720px); max-height: calc(100vh - 280px); overflow: hidden; z-index: 5; }
        .plot { width: 75px; height: 75px; background: #50341c; border: 4px solid #2d1d0f; border-radius: 2px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Entidades da Masmorra */
        .dungeon-ent { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 20; font-weight: bold; transition: all 0.1s; }
        .hp-bar { position: absolute; top: -10px; width: 100%; height: 5px; background: #441111; border: 1px solid #000; }
        .hp-fill { height: 100%; background: #ff3333; width: 100%; }

        /* Animações e Cultivos */
        .crop { font-size: 32px; animation: bobbing 1s infinite alternate ease-in-out; display: flex; flex-direction: column; align-items: center; }
        .crop.growing { filter: grayscale(70%) brightness(50%) scale(0.6); animation: none; }
        .crop.golden { filter: drop-shadow(0px 0px 6px #ffd700); }
        .crop.frozen { filter: drop-shadow(0px 0px 8px #aaddff) saturate(0.5); }
        .crop.divine { filter: drop-shadow(0px 0px 12px #ff00ff); }
        @keyframes bobbing { 0% { transform: translateY(0px); } 100% { transform: translateY(-4px); } }
        
        .timer-bar { position: absolute; bottom: 4px; left: 4px; width: calc(100% - 8px); height: 6px; background: #1a1510; }
        .timer-fill { height: 100%; width: 0%; background: #4caf50; }

        /* Sistema de Modais */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #221a15; border: 4px solid #b8860b; padding: 20px; z-index: 200; width: 90%; max-width: 560px; box-shadow: 0 12px 0px #0c0a07; max-height: 85vh; overflow-y: auto; color: #f4ecd8; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #443322; padding-bottom: 8px; margin-bottom: 12px; }
        .modal-header h3 { margin: 0; color: #ffd700; font-size: 14px; text-transform: uppercase; }
        .close-btn { background: #a62b2b; color: white; border: 2px solid #551111; padding: 4px 8px; cursor: pointer; font-family: inherit; font-weight: bold; }
        
        .shop-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 6px; background: #3d2d22; border: 2px solid #1f140e; color: #c4b5a3; cursor: pointer; font-size: 11px; font-family: inherit; text-transform: uppercase; }
        .tab-btn.active { background: #b8860b; color: #1a1510; border-color: #ffd700; }

        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border: 2px solid #3d2d22; background: #2d2017; }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .buy-btn { background: #38761d; color: white; border: 2px solid #1b3d0f; border-bottom-width: 3px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 11px; }
        .buy-btn:disabled { background: #444; border-color: #222; color: #777; cursor: not-allowed; }

        .adm-field { margin-bottom: 10px; display: flex; flex-direction: column; gap: 2px; }
        .adm-field label { font-weight: bold; color: #33ff33; font-size: 10px; text-transform: uppercase; }
        .adm-field input, .adm-field select { padding: 5px; background: #111; border: 2px solid #33ff33; color: #00ff00; font-family: inherit; font-size: 11px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2 id="farm-title">Fazenda Agrinho</h2>
        <p><span>🪙 Moedas:</span> <span id="coin-count">150</span></p>
        <p><span>⚔️ Arma Equipada:</span> <span id="weapon-status" style="color: #ffcc00;">Espada de Ferro</span></p>
        <p><span>🌱 Item Ativo:</span> <span id="selected-seed-text">Nenhum</span></p>
        <button class="btn-mochila" onclick="openBackpackModal()">🎒 Mochila & Forja [Space]</button>
        <div id="active-buffs"></div>
        <div id="shop-timer">Loja reestoca em: 03:00</div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 250px; left: 200px;">
            👨‍🌾
            <div id="weapon-render">⚔️</div>
        </div>
        
        <div id="npc-tiao" class="character" style="top: 30px; left: 360px; background: #3a6fa5;">🏪<span class="npc-label">Mercado Tião [E]</span></div>
        <div id="npc-mago" class="character" style="top: 30px; left: 560px; background: #6a329b;">🧙‍♂️<span class="npc-label">Altar Místico [E]</span></div>
        <div id="npc-chico" class="character" style="top: 30px; left: 760px; background: #a0522d;">👨‍💼<span class="npc-label">Seu Chico [E]</span></div>
        <div id="npc-hacker" class="character" style="top: 30px; left: 960px; background: #222222; border-color:#33ff33;">🕵️‍♂️<span class="npc-label">Terminal [E]</span></div>
        
        <div id="npc-dungeon" class="character" style="top: 450px; left: 1100px; background: #000; border-color: #ff3333;">🪦<span class="npc-label" style="border-color:#ff3333; color:#ff5555;">Masmorra Obscura [E]</span></div>
        
        <div id="farm-zones"></div>
        <div id="dungeon-entities-layer"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Menu</h3>
            <button class="close-btn" onclick="closeModal()">X</button>
        </div>
        <div class="shop-tabs" id="modal-tabs"></div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        let player = { x: 200, y: 250, speed: 5, inDungeon: false, weapon: 'espada' };
        let gameState = { coins: 150, maxPlots: 6, speedMultiplier: 1.0, weightBonus: 0, mutationChance: 0.06, hackerUnlocked: false, activeHotbarSlot: 0 };
        
        // Atributos de Combate/Forja das Armas
        let arsenal = {
            espada: { name: "Espada de Ferro", icon: "⚔️", level: 1, damage: 15, range: 60, speed: 250, desc: "Equilibrada. Velocidade e alcances normais." },
            lança: { name: "Lança Longa", icon: "🔱", level: 1, damage: 18, range: 110, speed: 450, desc: "Longo alcance, porém com estocadas lentas." },
            arco: { name: "Arco Ágil", icon: "🏹", level: 1, damage: 8, range: 75, speed: 120, desc: "Ataques extremamente rápidos, mas com menos dano." },
            picareta: { name: "Picareta Pesada", icon: "⛏️", level: 1, damage: 10, range: 50, speed: 300, desc: "Dano baixo em monstros, mas quebra minérios 2x mais rápido." },
            foice: { name: "Foice da Morte", icon: "🪓", level: 1, damage: 32, range: 80, speed: 600, desc: "Dano massivo. Reduz sua velocidade de movimento ao equipar." }
        };

        // Recursos de Mineração
        let minerios = { ferro: 0, ouro: 0 };
        let backpack = {};
        
        let hotbar = [
            { id: 'maca_semente', qty: 5, type: 'semente', level: 1, data: null }, 
            { id: 'banana_semente', qty: 3, type: 'semente', level: 1, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null },
            { id: null, qty: 0, type: '', level: 0, data: null },
            { id: null, qty: 0, type: '', level: 0, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null }
        ];

        // Estado da Masmorra
        let dungeon = { floor: 1, entities: [], active: false };

        let keysPressed = {};
        let shopStock = {};
        let currentStoreSeeds = [];
        let shopTimer = 180;
        let plots = [];
        let activeBuffs = {};
        let isAttacking = false;

        const fruitData = {
            maca: { name: "Maçã", icon: "🍎", basePrice: 15, weightMin: 0.3, time: 4, chance: 100 },
            banana: { name: "Banana", icon: "🍌", basePrice: 20, weightMin: 0.2, time: 6, chance: 100 },
            cenoura: { name: "Cenoura", icon: "🥕", basePrice: 22, weightMin: 0.15, time: 5, chance: 95 },
            laranja: { name: "Laranja", icon: "🍊", basePrice: 25, weightMin: 0.4, time: 8, chance: 95 },
            tomate: { name: "Tomate", icon: "🍅", basePrice: 30, weightMin: 0.25, time: 10, chance: 90 },
            melancia: { name: "Melancia", icon: "🍉", basePrice: 50, weightMin: 2.0, time: 16, chance: 75 },
            estrela: { name: "Fruta Estrela", icon: "⭐", basePrice: 150, weightMin: 0.3, time: 35, chance: 30 },
            divina: { name: "Divindade Mítica", icon: "👑", basePrice: 400, weightMin: 1.0, time: 50, chance: 0 } // Drop exclusivo do Boss
        };

        Object.keys(fruitData).forEach(k => {
            backpack[`${k}_semente`] = 0;
            backpack[`${k}_fruta`] = 0;
        });

        const upgrades = [
            { id: 'expand', name: 'Expandir Lote (+1 Terreno)', cost: 150, type: 'perm', action: () => { if(gameState.maxPlots < 15){ gameState.maxPlots++; createPlots(); } } },
            { id: 'fert_super', name: '⚡ Hiper-Nutriente (+2.0x Vel)', cost: 120, type: 'buff', duration: 15, speed: 0.2, buffKey: 'Super' }
        ];

        function init() {
            createPlots();
            refreshShopSeeds();
            updateUI();
            updateHotbarVisuals();

            // Loop de atualização do tempo e buffs
            setInterval(() => {
                if (shopTimer > 0) shopTimer--;
                else { refreshShopSeeds(); shopTimer = 180; }
                let mins = Math.floor(shopTimer / 60), secs = shopTimer % 60;
                document.getElementById('shop-timer').innerText = `Loja reestoca em: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);

            setInterval(() => {
                let currentSpeedMod = 1.0;
                if (activeBuffs['Super'] && activeBuffs['Super'] > 0) {
                    activeBuffs['Super']--; currentSpeedMod = 0.2;
                }
                gameState.speedMultiplier = currentSpeedMod;

                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= 0.2;
                        // Nível da semente reduz o tempo de crescimento total
                        let levelBonus = 1 - ((plot.seedLevel - 1) * 0.15);
                        let totalTime = fruitData[plot.fruit].time * gameState.speedMultiplier * levelBonus;
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;

                        if (plot.timer <= 0) {
                            plot.status = 'ready';
                            let cropDiv = plot.element.querySelector('.crop');
                            if (cropDiv) {
                                cropDiv.classList.remove('growing');
                                if (plot.mutationType) cropDiv.classList.add(plot.mutationType);
                            }
                            let timerBar = plot.element.querySelector('.timer-bar');
                            if (timerBar) timerBar.remove();
                        }
                    }
                });

                if (player.inDungeon) {
                    dungeonAIUpdate();
                }
            }, 200);

            window.addEventListener('keydown', e => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (currentModalNPC === 'mochila') closeModal();
                    else openBackpackModal();
                    return;
                }
                keysPressed[e.key.toLowerCase()] = true;
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
                if (e.key.toLowerCase() === 'f') executeAttack();
            });
            window.addEventListener('keyup', e => { keysPressed[e.key.toLowerCase()] = false; });

            gameLoop();
        }

        function createPlots() {
            const container = document.getElementById('farm-zones');
            container.innerHTML = '';
            let oldPlots = [...plots];
            plots = [];

            let finalPlotsCount = Math.min(gameState.maxPlots, 15);
            for(let i = 0; i < finalPlotsCount; i++) {
                let plotDiv = document.createElement('div');
                plotDiv.className = 'plot';
                plotDiv.id = `plot-${i}`;
                plotDiv.innerHTML = `<span style="color:#2d1d0f; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                container.appendChild(plotDiv);

                if (oldPlots[i]) {
                    plots.push(oldPlots[i]); plots[i].element = plotDiv;
                    if (plots[i].status !== 'empty') renderPlotAsset(plots[i]);
                } else {
                    plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutationType: null, weight: 0, seedLevel: 1 });
                }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit];
            let growingClass = plot.status === 'growing' ? 'growing' : '';
            let mutationClass = (plot.status === 'ready' && plot.mutationType) ? plot.mutationType : '';
            
            plot.element.innerHTML = `
                <div class="crop ${growingClass} ${mutationClass}">${data.icon}</div>
                <span style="color:#2d1d0f; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Lvl ${plot.seedLevel}</span>
            `;
            
            if (plot.status === 'growing') {
                let timerBar = document.createElement('div');
                timerBar.className = 'timer-bar';
                timerBar.innerHTML = `<div class="timer-fill"></div>`;
                plot.element.appendChild(timerBar);
            }
        }

        function selectSlot(index) {
            gameState.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`);
                let item = hotbar[i];
                if (item && item.id) {
                    let baseKey = item.id.split('_')[0];
                    if (item.type === 'semente') {
                        slot.querySelector('.slot-icon').innerText = fruitData[baseKey] ? fruitData[baseKey].icon : "🌱";
                        slot.querySelector('.slot-qty').innerText = "🌱" + item.qty;
                        slot.querySelector('.slot-lvl').innerText = "L." + item.level;
                    } else if (item.type === 'fruta') {
                        slot.querySelector('.slot-icon').innerText = item.data.icon;
                        slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                        slot.querySelector('.slot-lvl').innerText = "";
                    } else if (item.type === 'minerio') {
                        slot.querySelector('.slot-icon').innerText = item.id === 'ferro' ? "🪨" : "✨";
                        slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                        slot.querySelector('.slot-lvl').innerText = "";
                    }
                } else {
                    slot.querySelector('.slot-icon').innerText = '';
                    slot.querySelector('.slot-qty').innerText = '';
                    slot.querySelector('.slot-lvl').innerText = '';
                }
            }
        }

        function addItemToCollectedHotbar(itemKey, type, level, dataBlock) {
            for (let i = 0; i < 8; i++) {
                if (hotbar[i].id === itemKey && hotbar[i].type === type && hotbar[i].level === level) {
                    if (type === 'fruta') {
                        hotbar[i].data.qty++;
                        hotbar[i].data.price += dataBlock.price;
                    }
                    hotbar[i].qty++;
                    return;
                }
            }
            for (let i = 0; i < 8; i++) {
                if (hotbar[i].id === null) {
                    hotbar[i].id = itemKey;
                    hotbar[i].qty = 1;
                    hotbar[i].type = type;
                    hotbar[i].level = level;
                    hotbar[i].data = dataBlock ? { ...dataBlock, qty: 1 } : null;
                    return;
                }
            }
        }

        function handlePlotInteraction(index) {
            if (player.inDungeon) return;
            let plot = plots[index];
            let activeSlotItem = hotbar[gameState.activeHotbarSlot];

            if (plot.status === 'empty' && activeSlotItem && activeSlotItem.type === 'semente' && activeSlotItem.qty > 0) {
                plot.status = 'growing';
                plot.fruit = activeSlotItem.id.split('_')[0];
                plot.seedLevel = activeSlotItem.level;
                
                let levelBonus = 1 - ((plot.seedLevel - 1) * 0.15);
                plot.timer = fruitData[plot.fruit].time * gameState.speedMultiplier * levelBonus;
                
                // Balanceamento de mutações raras baseado no nível da semente
                let roll = Math.random();
                plot.mutationType = null;
                if (roll < gameState.mutationChance) {
                    let sub = Math.random();
                    if (plot.seedLevel >= 4 && sub > 0.70) plot.mutationType = 'divine';
                    else if (plot.seedLevel >= 3 && sub > 0.40) plot.mutationType = 'frozen';
                    else plot.mutationType = 'golden';
                }

                plot.weight = (Math.random() * 1.5 + fruitData[plot.fruit].weightMin) + gameState.weightBonus;

                activeSlotItem.qty--;
                if (activeSlotItem.qty <= 0) { hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', level: 0, data: null }; }

                renderPlotAsset(plot);
                updateUI();
                updateHotbarVisuals();
            } 
            else if (plot.status === 'ready') {
                let mult = 1.0 + (plot.seedLevel * 0.5); 
                if (plot.mutationType === 'golden') mult *= 2.5;
                if (plot.mutationType === 'frozen') mult *= 5.5;
                if (plot.mutationType === 'divine') mult *= 15.0;

                let calculatedPrice = fruitData[plot.fruit].basePrice * mult * plot.weight;
                let fruitUniqueKey = `${plot.fruit}_fruta`;

                let colheitaInfo = {
                    id: plot.fruit,
                    fullName: `${fruitData[plot.fruit].name} Lvl ${plot.seedLevel}`,
                    price: calculatedPrice,
                    icon: fruitData[plot.fruit].icon
                };

                addItemToCollectedHotbar(fruitUniqueKey, 'fruta', 1, colheitaInfo);

                plot.status = 'empty'; plot.fruit = null; plot.mutationType = null;
                plot.element.innerHTML = `<span style="color:#2d1d0f; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                
                updateUI();
                updateHotbarVisuals();
            }
        }

        /* SISTEMA DE COMBATE DA MASMORRA */
        function executeAttack() {
            if (isAttacking) return;
            isAttacking = true;
            
            let wep = arsenal[player.weapon];
            let renderWeapon = document.getElementById('weapon-render');
            renderWeapon.style.transform = "rotate(-60deg)";
            
            setTimeout(() => { renderWeapon.style.transform = "rotate(0deg)"; isAttacking = false; }, wep.speed);

            if (!player.inDungeon) return;

            // Varre entidades no raio de alcance
            dungeon.entities.forEach((ent) => {
                let dist = Math.sqrt(Math.pow(player.x - ent.x, 2) + Math.pow(player.y - ent.y, 2));
                if (dist <= wep.range) {
                    let finalDmg = wep.damage;
                    if (ent.type === 'minerio' && player.weapon === 'picareta') {
                        finalDmg *= 2; // Picareta causa dano dobrado em pedras
                    }
                    ent.hp -= finalDmg;
                    
                    // Feedback visual de acerto
                    ent.el.style.transform = "scale(1.2)";
                    setTimeout(() => { if (ent.el) ent.el.style.transform = "scale(1)"; }, 100);

                    if (ent.hp <= 0) {
                        handleEntityDeath(ent);
                    }
                }
            });

            // Limpa entidades mortas
            dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
            checkDungeonFloorClear();
        }

        function handleEntityDeath(ent) {
            if (ent.el) ent.el.remove();
            
            if (ent.type === 'slime' || ent.type === 'goblin') {
                gameState.coins += ent.level * 5;
                if (Math.random() < 0.40) {
                    let sementesNormais = ['maca', 'banana', 'cenoura', 'laranja', 'tomate', 'melancia'];
                    let sorteada = sementesNormais[Math.floor(Math.random() * sementesNormais.length)];
                    addItemToCollectedHotbar(`${sorteada}_semente`, 'semente', Math.min(Math.floor(dungeon.floor / 3) + 1, 4), null);
                }
            } 
            else if (ent.type === 'boss') {
                gameState.coins += 200;
                alert("👑 O Rei Slime foi destronado! Ele dropou Sementes Míticas Divinas!");
                addItemToCollectedHotbar('divina_semente', 'semente', 5, null);
                addItemToCollectedHotbar('divina_semente', 'semente', 5, null);
            }
            else if (ent.type === 'minerio') {
                if (ent.kind === 'ferro') minerios.ferro += (Math.floor(Math.random() * 3) + 2);
                if (ent.kind === 'ouro') minerios.ouro += (Math.floor(Math.random() * 2) + 1);
            }
            updateHotbarVisuals();
            updateUI();
        }

        function enterDungeon() {
            player.inDungeon = true;
            dungeon.floor = 1;
            document.getElementById('game-canvas').classList.add('dungeon-mode');
            document.getElementById('farm-zones').style.display = 'none';
            document.getElementById('farm-title').innerText = "Masmorra - Andar 1";
            
            // Reposiciona personagens da fazenda para fora da tela
            document.getElementById('npc-tiao').style.display = 'none';
            document.getElementById('npc-mago').style.display = 'none';
            document.getElementById('npc-chico').style.display = 'none';
            
            generateDungeonFloor();
        }

        function exitDungeon() {
            player.inDungeon = false;
            document.getElementById('game-canvas').classList.remove('dungeon-mode');
            document.getElementById('farm-zones').style.display = 'flex';
            document.getElementById('farm-title').innerText = "Fazenda Agrinho";
            
            document.getElementById('npc-tiao').style.display = 'flex';
            document.getElementById('npc-mago').style.display = 'flex';
            document.getElementById('npc-chico').style.display = 'flex';
            
            // Limpa camada da masmorra
            document.getElementById('dungeon-entities-layer').innerHTML = '';
            dungeon.entities = [];
        }

        function generateDungeonFloor() {
            let layer = document.getElementById('dungeon-entities-layer');
            layer.innerHTML = '';
            dungeon.entities = [];

            document.getElementById('farm-title').innerText = `Masmorra - Andar ${dungeon.floor}`;

            // A cada 5 andares spawna o BOSS
            if (dungeon.floor % 5 === 0) {
                spawnEntity('boss', 600, 300, 250 + (dungeon.floor * 30), "👑");
            } else {
                let qtdInimigos = 2 + dungeon.floor;
                for (let i = 0; i < Math.min(qtdInimigos, 8); i++) {
                    let rx = Math.random() * 600 + 400;
                    let ry = Math.random() * 300 + 150;
                    if (Math.random() > 0.5) {
                        spawnEntity('slime', rx, ry, 20 + (dungeon.floor * 8), "🟢");
                    } else {
                        spawnEntity('goblin', rx, ry, 35 + (dungeon.floor * 10), "👹");
                    }
                }
            }

            // Spawn de Recursos Minerais
            let qtdMinerios = Math.floor(Math.random() * 3) + 2;
            for(let i=0; i<qtdMinerios; i++) {
                let rx = Math.random() * 700 + 300;
                let ry = Math.random() * 300 + 150;
                if(Math.random() > 0.4) spawnEntity('minerio', rx, ry, 20, "🪨", 'ferro');
                else spawnEntity('minerio', rx, ry, 40, "✨", 'ouro');
            }
        }

        function spawnEntity(type, x, y, hp, icon, kind = '') {
            let layer = document.getElementById('dungeon-entities-layer');
            let el = document.createElement('div');
            el.className = "dungeon-ent";
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.innerHTML = `${icon}<div class="hp-bar"><div class="hp-fill"></div></div>`;
            layer.appendChild(el);

            dungeon.entities.push({ type, x, y, hp, maxHp: hp, icon, el, kind, level: dungeon.floor });
        }

        function dungeonAIUpdate() {
            dungeon.entities.forEach(ent => {
                if (ent.type === 'minerio') return;

                // Persegue o jogador levemente
                let dx = player.x - ent.x;
                let dy = player.y - ent.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 10 && dist < 400) {
                    let moveSp = ent.type === 'boss' ? 1.5 : 2.5;
                    ent.x += (dx / dist) * moveSp;
                    ent.y += (dy / dist) * moveSp;
                    ent.el.style.left = ent.x + 'px';
                    ent.el.style.top = ent.y + 'px';
                }
            });
        }

        function checkDungeonFloorClear() {
            let monstrosVivos = dungeon.entities.filter(e => e.type !== 'minerio').length;
            if (monstrosVivos === 0) {
                setTimeout(() => {
                    dungeon.floor++;
                    alert(`🎉 Andar Concluído! Descendo para o Andar ${dungeon.floor}`);
                    generateDungeonFloor();
                }, 800);
            }
        }

        /* MANIPULAÇÃO DE NPCS */
        function handleNPCDetection() {
            let tiaoDiv = document.getElementById('npc-tiao');
            let magoDiv = document.getElementById('npc-mago');
            let chicoDiv = document.getElementById('npc-chico');
            let hackerDiv = document.getElementById('npc-hacker');
            let dungDiv = document.getElementById('npc-dungeon');

            if (player.inDungeon) {
                // Se estiver dentro da masmorra perto do portal, sai dela
                let dungDist = Math.sqrt(Math.pow(player.x - dungDiv.offsetLeft, 2) + Math.pow(player.y - dungDiv.offsetTop, 2));
                if(dungDist < 70) exitDungeon();
                return;
            }

            let tiaoDist = Math.sqrt(Math.pow(player.x - tiaoDiv.offsetLeft, 2) + Math.pow(player.y - tiaoDiv.offsetTop, 2));
            let magoDist = Math.sqrt(Math.pow(player.x - magoDiv.offsetLeft, 2) + Math.pow(player.y - magoDiv.offsetTop, 2));
            let chicoDist = Math.sqrt(Math.pow(player.x - chicoDiv.offsetLeft, 2) + Math.pow(player.y - chicoDiv.offsetTop, 2));
            let hackerDist = Math.sqrt(Math.pow(player.x - hackerDiv.offsetLeft, 2) + Math.pow(player.y - hackerDiv.offsetTop, 2));
            let dungDist = Math.sqrt(Math.pow(player.x - dungDiv.offsetLeft, 2) + Math.pow(player.y - dungDiv.offsetTop, 2));

            if (tiaoDist < 70) openNPCModal('tiao');
            else if (magoDist < 70) openNPCModal('mago');
            else if (chicoDist < 70) openNPCModal('chico');
            else if (dungDist < 70) enterDungeon();
            else if (hackerDist < 70) openNPCModal('hacker');
        }

        function gameLoop() {
            let actualSpeed = player.speed;
            if (player.weapon === 'foice') actualSpeed *= 0.65; // Debuff de lentidão lógica da foice pesada

            if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= actualSpeed;
            if (keysPressed['d'] || keysPressed['arrowright']) player.x += actualSpeed;
            if (keysPressed['w'] || keysPressed['arrowup']) player.y -= actualSpeed;
            if (keysPressed['s'] || keysPressed['arrowdown']) player.y += actualSpeed;
            
            player.x = Math.max(0, Math.min(window.innerWidth - 45, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 135, player.y));

            let pEl = document.getElementById('player');
            if (pEl) {
                pEl.style.left = player.x + 'px';
                pEl.style.top = player.y + 'px';
            }

            requestAnimationFrame(gameLoop);
        }

        window.onload = init;
    </script>
</body>
</html>
