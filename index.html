<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Masmorra & Hacker Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #1a1a1a; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        #game-container { 
            width: 800px; 
            height: 600px; 
            margin: 20px auto; 
            position: relative; 
        }
        
        /* Estilos do Painel Hacker */
        #hacker-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            z-index: 10;
            display: none;
            width: 280px;
        }
        #hacker-panel h3 { 
            margin-top: 0; 
            text-align: center; 
            border-bottom: 1px solid #00ff00; 
            padding-bottom: 5px; 
        }
        .hacker-group { 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .hacker-group label { 
            font-size: 12px; 
        }
        .hacker-group input, .hacker-group select { 
            background: #000; 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            width: 100px; 
            padding: 2px; 
        }
        #btn-toggle-hacker { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            z-index: 11; 
            background: #333; 
            color: #fff; 
            border: 1px solid #fff; 
            padding: 5px 10px; 
            cursor: pointer; 
        }
        #btn-apply-hack {
            width: 100%; 
            background: #00ff00; 
            color: #000; 
            border: none; 
            padding: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<button id="btn-toggle-hacker">DevPanel (Hacker)</button>

<div id="game-container">
    <div id="hacker-panel">
        <h3>HACKER PANEL v1.0</h3>
        <div class="hacker-group">
            <label>Dinheiro:</label>
            <input type="number" id="hack-money" value="100">
        </div>
        <div class="hacker-group">
            <label>Qtd Sementes Hotbar:</label>
            <input type="number" id="hack-seeds-qty" value="5">
        </div>
        <div class="hacker-group">
            <label>Tipo de Semente:</label>
            <select id="hack-seed-type">
                <option value="Comum">Comum (Nível 1)</option>
                <option value="Rara">Rara (Nível 2)</option>
                <option value="Épica">Épica (Nível 3)</option>
                <option value="Divina">Divina (Nível 4)</option>
            </select>
        </div>
        <div class="hacker-group">
            <label>Dano da Arma:</label>
            <input type="number" id="hack-damage" value="10">
        </div>
        <button id="btn-apply-hack">APLICAR TRAPAÇAS</button>
    </div>
</div>

<script>
// --- CONFIGURAÇÃO GLOBAL DO ESTADO DO JOGADOR ---
const playerState = {
    money: 100,
    hotbar: { seedType: 'Comum', seedLevel: 1, quantity: 5 },
    currentWeapon: 'Espada',
    weaponDamage: 10,
    weaponLevel: 1,
    inventoryOres: 0,
    dungeonLevel: 1
};

// --- BALANCEAMENTO DAS ARMAS (PRÓS E CONTRAS) ---
const weaponStats = {
    'Espada':  { damageBase: 10, range: 50,  speed: 300, pros: 'Equilibrada', cons: 'Sem bônus único' },
    'Arco':    { damageBase: 7,  range: 200, speed: 500, pros: 'Longo Alcance', cons: 'Dano menor' },
    'Picareta':{ damageBase: 8,  range: 40,  speed: 400, pros: 'Minera Rápido', cons: 'Curto alcance' },
    'Foice':   { damageBase: 12, range: 60,  speed: 600, pros: 'Grande Área', cons: 'Ataque lento' },
    'Lança':   { damageBase: 11, range: 110, speed: 450, pros: 'Alto Alcance', cons: 'Ataque linear lento' }
};

// --- CENA DO MUNDO PRINCIPAL ---
class MainScene extends Phaser.Scene {
    constructor() { super({ key: 'MainScene' }); }

    preload() {}

    create() {
        this.add.text(20, 20, "MUNDO PRINCIPAL (Fazenda)", { fontSize: '24px', fill: '#fff' });
        
        this.statusText = this.add.text(20, 60, '', { fontSize: '14px', fill: '#00ff00' });
        this.updateStatusDisplay();

        // Loja Normal Visível
        const normalShop = this.add.rectangle(150, 300, 100, 80, 0x3498db).setInteractive();
        this.add.text(115, 290, "Loja Geral\n(Visível)", { fontSize: '12px', fill: '#fff' });
        normalShop.on('pointerdown', () => alert("Abriu Loja Geral: Itens básicos."));

        // LOJA DE SEMENTES ESCONDIDA (Canto superior direito, camuflada)
        const fakeObstacle = this.add.rectangle(700, 100, 80, 80, 0x27ae60);
        const hiddenShop = this.add.rectangle(700, 100, 40, 40, 0xe74c3c).setInteractive().setAlpha(0.1);
        this.add.text(660, 150, "(Árvore Densa)", { fontSize: '11px', fill: '#7f8c8d' });
        
        hiddenShop.on('pointerdown', () => {
            alert("✨ Você encontrou a Loja Secreta de Sementes! ✨\nAqui há raridades escondidas!");
        });

        // ENTRADA DA MASMORRA (Canto inferior direito)
        const dungeonEntrance = this.add.rectangle(720, 520, 100, 100, 0x2c3e50).setInteractive();
        dungeonEntrance.setStrokeStyle(4, 0x95a5a6);
        this.add.text(685, 500, "MASMORRA\n(Clique)", { fontSize: '14px', fill: '#fff', align: 'center' });

        dungeonEntrance.on('pointerdown', () => {
            this.scene.start('DungeonScene');
        });
    }

    updateStatusDisplay() {
        this.statusText.setText(
            `Dinheiro: $${playerState.money}\n` +
            `Hotbar: ${playerState.hotbar.quantity}x Semente ${playerState.hotbar.seedType} (Nível ${playerState.hotbar.seedLevel})\n` +
            `Arma Atual: ${playerState.currentWeapon} (Lvl ${playerState.weaponLevel}) - Dano: ${playerState.weaponDamage}\n` +
            `Minérios: ${playerState.inventoryOres}`
        );
    }
}

// --- CENA DA MASMORRA ---
class DungeonScene extends Phaser.Scene {
    constructor() { super({ key: 'DungeonScene' }); }

    create() {
        this.cameras.main.setBackgroundColor('#111');
        this.titleText = this.add.text(20, 20, `MASMORRA - NÍVEL ${playerState.dungeonLevel}`, { fontSize: '24px', fill: '#e74c3c' });
        
        // Sistema de Boss a cada 5 níveis
        this.isBossLevel = playerState.dungeonLevel % 5 === 0;
        
        if (this.isBossLevel) {
            this.titleText.setText(`👹 SALA DO BOSS (Nível ${playerState.dungeonLevel})`);
            this.spawnBoss();
        } else {
            this.spawnNormalRoom();
        }

        // Botão de retornar
        const leaveBtn = this.add.rectangle(100, 550, 140, 40, 0x7f8c8d).setInteractive();
        this.add.text(50, 540, "Sair da Masmorra", { fontSize: '14px', fill: '#fff' });
        leaveBtn.on('pointerdown', () => this.scene.start('MainScene'));
    }

    spawnNormalRoom() {
        this.add.text(20, 70, "Minere recursos e derrote os monstros para descer!", { fontSize: '14px', fill: '#fff' });

        // Minério coletável para upgrades
        const ore = this.add.circle(300, 300, 30, 0x9b59b6).setInteractive();
        const oreText = this.add.text(265, 290, "MINÉRIO", { fontSize: '12px', fill: '#fff' });
        
        ore.on('pointerdown', () => {
            playerState.inventoryOres += 2;
            alert(`Você coletou 2 minérios usando seu(sua) ${playerState.currentWeapon}!`);
            ore.destroy();
            oreText.destroy();
        });

        // Avançar nível
        const killMonstersBtn = this.add.rectangle(400, 450, 200, 50, 0x27ae60).setInteractive();
        this.add.text(320, 440, "Derrotar Monstros", { fontSize: '14px', fill: '#fff' });
        killMonstersBtn.on('pointerdown', () => {
            playerState.dungeonLevel++;
            this.scene.restart();
        });

        // Sistema de Forja
        const forgeBtn = this.add.rectangle(650, 300, 150, 60, 0xd35400).setInteractive();
        this.add.text(590, 285, "FORJAR ARMA\n(-5 Minérios)", { fontSize: '11px', fill: '#fff', align: 'center' });
        
        forgeBtn.on('pointerdown', () => {
            if (playerState.inventoryOres >= 5) {
                playerState.inventoryOres -= 5;
                playerState.weaponLevel++;
                playerState.weaponDamage += 5;
                alert(`Arma aprimorada! Nível Atual: ${playerState.weaponLevel} | Dano: ${playerState.weaponDamage}`);
            } else {
                alert("Você precisa de pelo menos 5 minérios!");
            }
        });

        this.showWeaponSelector();
    }

    spawnBoss() {
        const boss = this.add.rectangle(400, 250, 120, 120, 0xc0392b).setInteractive();
        this.add.text(350, 160, "💥 CHEFÃO DA SALA 💥", { fontSize: '20px', fill: '#ff3333' });
        
        let bossHP = 50 * playerState.dungeonLevel;
        const hpText = this.add.text(360, 330, `HP: ${bossHP}`, { fontSize: '16px', fill: '#fff' });

        boss.on('pointerdown', () => {
            bossHP -= playerState.weaponDamage;
            hpText.setText(`HP: ${bossHP}`);

            if (bossHP <= 0) {
                alert("🏆 VOCÊ DESTRUIU O BOSS!");
                this.rollBossDrops();
                playerState.dungeonLevel++;
                this.scene.restart();
            }
        });
    }

    rollBossDrops() {
        const rand = Math.random();
        // 15% de chance de obter a Semente Divina Máxima
        if (rand < 0.15) {
            playerState.hotbar.seedType = 'Divina';
            playerState.hotbar.seedLevel = 4;
            playerState.hotbar.quantity += 1;
            alert("🔥 RECOMPENSA DOS DEUSES! Você dropou uma SEMENTE DIVINA (Nível 4)!");
        } else if (rand < 0.50) {
            playerState.hotbar.seedType = 'Épica';
            playerState.hotbar.seedLevel = 3;
            playerState.hotbar.quantity += 2;
            alert("⭐ O Boss deixou cair Sementes Épicas (Nível 3)!");
        } else {
            playerState.hotbar.quantity += 5;
            alert("Drop comum: Você recebeu 5 sementes padrão.");
        }
    }

    showWeaponSelector() {
        this.add.text(450, 40, "Mudar Equipamento:", { fontSize: '14px', fill: '#fff' });
        let spacing = 0;
        Object.keys(weaponStats).forEach(wName => {
            const btn = this.add.text(450, 70 + spacing, `[ ${wName} ]`, { fontSize: '12px', fill: '#3498db' }).setInteractive();
            
            btn.on('pointerover', () => {
                this.tooltip?.destroy();
                const stat = weaponStats[wName];
                this.tooltip = this.add.text(450, 480, `Prós: ${stat.pros}\nContras: ${stat.cons}`, {fontSize:'12px', fill:'#f1c40f'});
            });

            btn.on('pointerdown', () => {
                playerState.currentWeapon = wName;
                playerState.weaponDamage = weaponStats[wName].damageBase + ((playerState.weaponLevel - 1) * 5);
                alert(`Arma ativa: ${wName}`);
            });
            spacing += 25;
        });
    }
}

// --- CONFIGURAÇÃO INICIAL DO PHASER ---
const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: 800,
    height: 600,
    scene: [MainScene, DungeonScene]
};

const game = new Phaser.Game(config);

// --- INTERAÇÕES DO PAINEL HACKER EM JAVASCRIPT ---
document.getElementById('btn-toggle-hacker').addEventListener('click', () => {
    const panel = document.getElementById('hacker-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('btn-apply-hack').addEventListener('click', () => {
    playerState.money = parseInt(document.getElementById('hack-money').value) || 0;
    playerState.hotbar.quantity = parseInt(document.getElementById('hack-seeds-qty').value) || 0;
    
    const selectedSeed = document.getElementById('hack-seed-type').value;
    playerState.hotbar.seedType = selectedSeed;
    
    if(selectedSeed === 'Comum') playerState.hotbar.seedLevel = 1;
    if(selectedSeed === 'Rara') playerState.hotbar.seedLevel = 2;
    if(selectedSeed === 'Épica') playerState.hotbar.seedLevel = 3;
    if(selectedSeed === 'Divina') playerState.hotbar.seedLevel = 4;

    playerState.weaponDamage = parseInt(document.getElementById('hack-damage').value) || 10;

    alert("🚨 Códigos de trapaça injetados com sucesso!");
    
    if (game.scene.isActive('MainScene')) {
        game.scene.getScene('MainScene').updateStatusDisplay();
    }
});
</script>

</body>
</html>
