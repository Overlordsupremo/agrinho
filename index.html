<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha do Agrinho - Pixel RPG 16-Bit Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a2e10; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* UI Superior - Estilo Caixa de RPG Antigo */
        #ui-top { position: absolute; top: 15px; left: 15px; background: #2c1e14; color: #f4ecd8; padding: 12px; border-radius: 2px; border: 4px solid #6b4c35; z-index: 100; min-width: 320px; box-shadow: 0 6px 0px #140d08, inset 0 0 8px #000; }
        #ui-top h2 { margin: 0 0 6px 0; color: #ffcc00; font-size: 15px; text-align: center; border-bottom: 3px double #4e3522; padding-bottom: 4px; text-transform: uppercase; text-shadow: 2px 2px #000; }
        #ui-top p { margin: 4px 0; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; }
        #shop-timer { color: #ff5555; font-size: 11px; font-weight: bold; margin-top: 6px; text-align: center; background: #140808; padding: 2px; border: 2px solid #4a1515; }
        
        /* Barra de Vida Pixel Art */
        .player-hp-container { margin-bottom: 8px; background: #000; border: 2px solid #444; padding: 2px; height: 20px; position: relative; box-shadow: inset 0 0 4px #000; }
        .player-hp-fill { height: 100%; width: 100%; background: linear-gradient(to bottom, #ff2222, #aa0000); transition: width 0.1s; }
        .player-hp-text { position: absolute; width: 100%; text-align: center; top: 1px; left: 0; font-size: 11px; font-weight: bold; color: #fff; text-shadow: 1px 1px #000; }

        .btn-mochila { width: 100%; margin-top: 6px; background: #4a5da3; color: white; border: 2px solid #232e5c; border-bottom-width: 4px; padding: 5px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; font-family: inherit; text-shadow: 1px 1px #000; }
        .btn-mochila:active { border-bottom-width: 2px; margin-top: 8px; margin-bottom: -2px; }

        /* Hotbar Pixel Retrô */
        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: #18120c; padding: 6px; border: 4px solid #4a3319; border-radius: 0px; z-index: 100; box-shadow: 0 6px 0 #000; }
        .hotbar-slot { width: 52px; height: 52px; background: #362517; border: 3px solid #22160e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; box-shadow: inset 0 0 6px rgba(0,0,0,0.8); }
        .hotbar-slot.selected { border-color: #ffaa00; background: #4e3522; transform: scale(1.05); }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8c735b; }
        .hotbar-slot .slot-icon { font-size: 20px; margin-top: 2px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 2px; font-size: 10px; color: #ffcc00; font-weight: bold; text-shadow: 1px 1px #000; }
        .hotbar-slot .slot-lvl { position: absolute; top: 1px; right: 2px; font-size: 9px; color: #5cc8ff; font-weight: bold; text-shadow: 1px 1px #000; }

        /* Cenários Estilo Tilesets Stardew Valley */
        #game-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #4d7a34; background-image: radial-gradient(#56873b 20%, transparent 20%), radial-gradient(#46702f 20%, transparent 20%); background-size: 16px 16px; background-position: 0 0, 8px 8px; z-index: 1; }
        #game-canvas.dungeon-mode { background: #1d1d24; background-image: linear-gradient(45deg, #16161c 25%, transparent 25%), linear-gradient(-45deg, #16161c 25%, transparent 25%); background-size: 32px 32px; }
        
        /* Personagem Pixelado Terraria Style */
        #player { position: absolute; width: 42px; height: 52px; background: linear-gradient(to bottom, #7fa4ff 20%, #ffcc55 20%, #ffcc55 50%, #444 50%, #444 80%, #333 80%); border: 3px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 50; box-shadow: 0 6px 0 rgba(0,0,0,0.3); }
        #weapon-render { position: absolute; right: -12px; top: 8px; font-size: 18px; transition: transform 0.1s; transform-origin: bottom left; filter: drop-shadow(2px 2px 0px #000); }

        /* Estruturas Pixel Art */
        .character { position: absolute; width: 50px; height: 50px; font-size: 24px; z-index: 10; border: 3px solid #1a110b; border-radius: 0px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #000, inset 0 0 6px rgba(0,0,0,0.5); }
        .npc-label { position: absolute; top: -24px; background: #1c120c; color: #f4ecd8; padding: 2px 5px; border: 2px solid #573b24; font-size: 9px; font-weight: bold; white-space: nowrap; box-shadow: 0 2px 0 #000; }
        
        /* Lotes Terras Gradeadas */
        #farm-zones { position: absolute; top: 160px; left: 340px; display: flex; flex-wrap: wrap; gap: 8px; max-width: calc(100vw - 720px); max-height: calc(100vh - 280px); overflow: hidden; z-index: 5; }
        .plot { width: 72px; height: 72px; background: #422a18; border: 4px solid #26170c; border-radius: 0px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 0 4px 6px #000; }
        
        /* Masmorra Monstros & Coisas */
        .dungeon-ent { position: absolute; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 20; animation: floatEnemy 0.6s infinite alternate ease-in-out; }
        @keyframes floatEnemy { 0% { transform: translateY(0px); } 100% { transform: translateY(-3px); } }
        .hp-bar { position: absolute; top: -10px; width: 100%; height: 5px; background: #220000; border: 1px solid #000; }
        .hp-fill { height: 100%; background: #e61919; width: 100%; }

        /* Cultivos e Mutações Retrô */
        .crop { font-size: 30px; animation: bobbing 1s infinite alternate ease-in-out; display: flex; flex-direction: column; align-items: center; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.4)); }
        .crop.growing { filter: grayscale(80%) brightness(40%) scale(0.6); animation: none; }
        .crop.golden { filter: drop-shadow(0px 0px 5px #ffd700) brightness(1.2); }
        .crop.frozen { filter: drop-shadow(0px 0px 6px #70c5ff); }
        .crop.divine { filter: drop-shadow(0px 0px 10px #ff00ff) brightness(1.3); }
        @keyframes bobbing { 0% { transform: translateY(0px); } 100% { transform: translateY(-3px); } }
        
        .timer-bar { position: absolute; bottom: 4px; left: 4px; width: calc(100% - 8px); height: 5px; background: #111; }
        .timer-fill { height: 100%; width: 0%; background: #38b349; }

        /* Menu Modais UI Estilo RPG */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #291c12; border: 4px solid #543a24; padding: 18px; z-index: 200; width: 92%; max-width: 560px; box-shadow: 0 10px 0px #000, inset 0 0 10px #000; max-height: 85vh; overflow-y: auto; color: #f4ecd8; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #402b1b; padding-bottom: 6px; margin-bottom: 10px; }
        .modal-header h3 { margin: 0; color: #ffcc00; font-size: 13px; text-transform: uppercase; text-shadow: 1px 1px #000; }
        .close-btn { background: #912323; color: white; border: 2px solid #4a1212; padding: 3px 8px; cursor: pointer; font-family: inherit; font-weight: bold; }
        
        .shop-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 5px; background: #3d281a; border: 2px solid #1a100a; color: #bfaea0; cursor: pointer; font-size: 11px; font-family: inherit; text-transform: uppercase; }
        .tab-btn.active { background: #735135; color: #fff; border-color: #ffaa00; }

        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border: 2px solid #3d281a; background: #21160e; box-shadow: inset 0 0 4px #000; }
        .item-info { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .buy-btn { background: #2b5c16; color: white; border: 2px solid #142e09; border-bottom-width: 3px; padding: 4px 8px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 11px; text-shadow: 1px 1px #000; }
        .buy-btn:disabled { background: #3a3a3a; border-color: #111; color: #666; cursor: not-allowed; text-shadow: none; }

        .adm-field { margin-bottom: 8px; display: flex; flex-direction: column; gap: 2px; }
        .adm-field label { font-weight: bold; color: #00ff00; font-size: 9px; text-transform: uppercase; text-shadow: 1px 1px #000; }
        .adm-field input, .adm-field select { padding: 4px; background: #000; border: 2px solid #00ff00; color: #00ff00; font-family: inherit; font-size: 11px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>Fazenda Retrô Agrinho</h2>
        
        <div class="player-hp-container">
            <div id="hp-bar" class="player-hp-fill"></div>
            <div id="hp-text" class="player-hp-text">HP: 100 / 100</div>
        </div>

        <p><span>🪙 Moedas:</span> <span id="coin-count">150</span></p>
        <p><span>⚔️ Arsenal:</span> <span id="weapon-status" style="color: #ffaa00;">Espada de Ferro</span></p>
        <p><span>🌱 Item em Mão:</span> <span id="selected-seed-text">Nenhum</span></p>
        <button class="btn-mochila" onclick="openBackpackModal()">🎒 Ver Mochila & Forja [Space]</button>
        <div id="shop-timer">Loja reestoca em: 03:00</div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span><span class="slot-lvl"></span></div>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 250px; left: 200px;">
            🤠
            <div id="weapon-render">⚔️</div>
        </div>
        
        <div id="npc-tiao" class="character" style="top: 25px; left: 360px; background: #2f4560;">🏪<span class="npc-label">Tião [E]</span></div>
        <div id="npc-mago" class="character" style="top: 25px; left: 540px; background: #50287a;">🧙‍♂️<span class="npc-label">Mago [E]</span></div>
        <div id="npc-chico" class="character" style="top: 25px; left: 720px; background: #7a431d;">👨‍💼<span class="npc-label">Chico [E]</span></div>
        <div id="npc-hacker" class="character" style="top: 25px; left: 900px; background: #111; border-color:#00ff00;">🕵️‍♂️<span class="npc-label">Terminal [E]</span></div>
        
        <div id="npc-dungeon" class="character" style="top: 450px; left: 1100px; background: #14111f; border-color: #991b1b;">😈<span class="npc-label" style="border-color:#b91c1c; color:#f87171;">Masmorra [E]</span></div>
        
        <div id="farm-zones"></div>
        <div id="dungeon-entities-layer"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Painel de Controle</h3>
            <button class="close-btn" onclick="closeModal()">X</button>
        </div>
        <div class="shop-tabs" id="modal-tabs"></div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        // Adicionada Vida Máxima e Atual ao Jogador
        let player = { x: 200, y: 250, speed: 5, inDungeon: false, weapon: 'espada', hp: 100, maxHp: 100 };
        let gameState = { coins: 150, maxPlots: 6, speedMultiplier: 1.0, weightBonus: 0, mutationChance: 0.06, hackerUnlocked: false, activeHotbarSlot: 0 };
        
        let arsenal = {
            espada: { name: "Espada de Ferro", icon: "⚔️", level: 1, damage: 16, range: 65, speed: 220, desc: "Balanço ágil e dano estável." },
            lança: { name: "Lança Pontuda", icon: "🔱", level: 1, damage: 20, range: 115, speed: 400, desc: "Ataque a distância, porém pesada." },
            arco: { name: "Arco de Caça", icon: "🏹", level: 1, damage: 9, range: 80, speed: 130, desc: "Disparos em rajadas velozes." },
            picareta: { name: "Picareta Rústica", icon: "⛏️", level: 1, damage: 11, range: 55, speed: 280, desc: "Dano extra contra veios de minério." },
            foice: { name: "Foice Ceifadora", icon: "🪓", level: 1, damage: 34, range: 85, speed: 550, desc: "Dano massivo. Reduz mobilidade ao portar." }
        };

        let minerios = { ferro: 0, ouro: 0 };
        
        // Mochila agora começa preparada para acumular qualquer quantidade
        let backpack = {
            maca_semente: { qty: 2, level: 1, type: 'semente' },
            banana_semente: { qty: 1, level: 2, type: 'semente' }
        };
        
        let hotbar = [
            { id: 'maca_semente', qty: 5, type: 'semente', level: 1, data: null }, 
            { id: 'banana_semente', qty: 3, type: 'semente', level: 1, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null },
            { id: null, qty: 0, type: '', level: 0, data: null },
            { id: null, qty: 0, type: '', level: 0, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null }, 
            { id: null, qty: 0, type: '', level: 0, data: null }
        ];

        let dungeon = { floor: 1, entities: [] };
        let keysPressed = {};
        let shopStock = {};
        let currentStoreSeeds = [];
        let shopTimer = 180;
        let plots = [];
        let isAttacking = false;

        const fruitData = {
            maca: { name: "Maçã", icon: "🍎", basePrice: 15, time: 4, chance: 100, weightMin: 0.3 },
            banana: { name: "Banana", icon: "🍌", basePrice: 20, time: 6, chance: 100, weightMin: 0.2 },
            cenoura: { name: "Cenoura", icon: "🥕", basePrice: 22, time: 5, chance: 95, weightMin: 0.15 },
            laranja: { name: "Laranja", icon: "🍊", basePrice: 25, time: 8, chance: 95, weightMin: 0.4 },
            tomate: { name: "Tomate", icon: "🍅", basePrice: 30, time: 10, chance: 90, weightMin: 0.25 },
            melancia: { name: "Melancia", icon: "🍉", basePrice: 50, time: 16, chance: 75, weightMin: 2.0 },
            estrela: { name: "Fruta Estrela", icon: "⭐", basePrice: 150, time: 35, chance: 30, weightMin: 0.3 },
            divina: { name: "Divindade Mítica", icon: "👑", basePrice: 400, time: 50, chance: 0, weightMin: 1.0 }
        };

        function init() {
            createPlots();
            refreshShopSeeds();
            updateUI();
            updateHotbarVisuals();

            setInterval(() => {
                if (shopTimer > 0) shopTimer--;
                else { refreshShopSeeds(); shopTimer = 180; }
                let mins = Math.floor(shopTimer / 60), secs = shopTimer % 60;
                document.getElementById('shop-timer').innerText = `Loja reestoca em: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);

            setInterval(() => {
                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= 0.2;
                        let levelBonus = 1 - ((plot.seedLevel - 1) * 0.15);
                        let totalTime = fruitData[plot.fruit].time * gameState.speedMultiplier * levelBonus;
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;

                        if (plot.timer <= 0) {
                            plot.status = 'ready';
                            let cropDiv = plot.element.querySelector('.crop');
                            if (cropDiv) {
                                cropDiv.classList.remove('growing');
                                if (plot.mutationType) cropDiv.classList.add(plot.mutationType);
                            }
                            let timerBar = plot.element.querySelector('.timer-bar');
                            if (timerBar) timerBar.remove();
                        }
                    }
                });

                if (player.inDungeon) {
                    dungeonAIAndDamageUpdate();
                }
            }, 200);

            window.addEventListener('keydown', e => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (currentModalNPC === 'mochila') closeModal();
                    else openBackpackModal();
                    return;
                }
                keysPressed[e.key.toLowerCase()] = true;
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
                if (e.key.toLowerCase() === 'f') executeAttack();
            });
            window.addEventListener('keyup', e => { keysPressed[e.key.toLowerCase()] = false; });

            gameLoop();
        }

        function createPlots() {
            const container = document.getElementById('farm-zones');
            container.innerHTML = '';
            let oldPlots = [...plots];
            plots = [];

            let finalPlotsCount = Math.min(gameState.maxPlots, 15);
            for(let i = 0; i < finalPlotsCount; i++) {
                let plotDiv = document.createElement('div');
                plotDiv.className = 'plot';
                plotDiv.id = `plot-${i}`;
                plotDiv.innerHTML = `<span style="color:#26170c; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                container.appendChild(plotDiv);

                if (oldPlots[i]) {
                    plots.push(oldPlots[i]); plots[i].element = plotDiv;
                    if (plots[i].status !== 'empty') renderPlotAsset(plots[i]);
                } else {
                    plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutationType: null, weight: 0, seedLevel: 1 });
                }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit];
            let growingClass = plot.status === 'growing' ? 'growing' : '';
            let mutationClass = (plot.status === 'ready' && plot.mutationType) ? plot.mutationType : '';
            
            plot.element.innerHTML = `
                <div class="crop ${growingClass} ${mutationClass}">${data.icon}</div>
                <span style="color:#26170c; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Lvl ${plot.seedLevel}</span>
            `;
            
            if (plot.status === 'growing') {
                let timerBar = document.createElement('div');
                timerBar.className = 'timer-bar';
                timerBar.innerHTML = `<div class="timer-fill"></div>`;
                plot.element.appendChild(timerBar);
            }
        }

        function selectSlot(index) {
            gameState.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`);
                let item = hotbar[i];
                if (item && item.id) {
                    let baseKey = item.id.split('_')[0];
                    if (item.type === 'semente') {
                        slot.querySelector('.slot-icon').innerText = fruitData[baseKey] ? fruitData[baseKey].icon : "🌱";
                        slot.querySelector('.slot-qty').innerText = "🌱" + item.qty;
                        slot.querySelector('.slot-lvl').innerText = "L." + item.level;
                    } else if (item.type === 'fruta') {
                        slot.querySelector('.slot-icon').innerText = item.data.icon;
                        slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                        slot.querySelector('.slot-lvl').innerText = "";
                    } else if (item.type === 'minerio') {
                        slot.querySelector('.slot-icon').innerText = item.id === 'ferro' ? "🪨" : "✨";
                        slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                        slot.querySelector('.slot-lvl').innerText = "";
                    }
                } else {
                    slot.querySelector('.slot-icon').innerText = '';
                    slot.querySelector('.slot-qty').innerText = '';
                    slot.querySelector('.slot-lvl').innerText = '';
                }
            }
        }

        // NOVO SISTEMA: Envia itens da Hotbar ativa para a Mochila interna
        function sendActiveSlotToBackpack() {
            let item = hotbar[gameState.activeHotbarSlot];
            if (!item || !item.id) return;

            let key = item.id;
            if (!backpack[key]) {
                backpack[key] = { qty: 0, level: item.level || 1, type: item.type, data: item.data ? { ...item.data } : null };
            }
            backpack[key].qty += item.qty;

            // Esvazia slot da hotbar
            hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', level: 0, data: null };
            alert("📦 Item movido da mão e guardado na Mochila!");
            
            updateHotbarVisuals();
            updateUI();
            if(document.getElementById('game-modal').style.display === 'block') renderInventoryTab();
        }

        function addItemToCollectedHotbar(itemKey, type, level, dataBlock) {
            for (let i = 0; i < 8; i++) {
                if (hotbar[i].id === itemKey && hotbar[i].type === type && hotbar[i].level === level) {
                    if (type === 'fruta') hotbar[i].data.price += dataBlock.price;
                    hotbar[i].qty++;
                    return;
                }
            }
            for (let i = 0; i < 8; i++) {
                if (hotbar[i].id === null) {
                    hotbar[i].id = itemKey;
                    hotbar[i].qty = 1;
                    hotbar[i].type = type;
                    hotbar[i].level = level;
                    hotbar[i].data = dataBlock ? { ...dataBlock } : null;
                    return;
                }
            }
            // Se a hotbar estiver completamente cheia, envia automaticamente para a mochila
            if (!backpack[itemKey]) backpack[itemKey] = { qty: 0, level: level, type: type, data: dataBlock };
            backpack[itemKey].qty++;
        }

        function handlePlotInteraction(index) {
            if (player.inDungeon) return;
            let plot = plots[index];
            let activeSlotItem = hotbar[gameState.activeHotbarSlot];

            if (plot.status === 'empty' && activeSlotItem && activeSlotItem.type === 'semente' && activeSlotItem.qty > 0) {
                plot.status = 'growing';
                plot.fruit = activeSlotItem.id.split('_')[0];
                plot.seedLevel = activeSlotItem.level;
                
                let levelBonus = 1 - ((plot.seedLevel - 1) * 0.15);
                plot.timer = fruitData[plot.fruit].time * gameState.speedMultiplier * levelBonus;
                
                let roll = Math.random();
                plot.mutationType = null;
                if (roll < gameState.mutationChance) {
                    let sub = Math.random();
                    if (plot.seedLevel >= 4 && sub > 0.70) plot.mutationType = 'divine';
                    else if (plot.seedLevel >= 3 && sub > 0.40) plot.mutationType = 'frozen';
                    else plot.mutationType = 'golden';
                }

                plot.weight = (Math.random() * 1.5 + fruitData[plot.fruit].weightMin) + gameState.weightBonus;
                activeSlotItem.qty--;
                
                if (activeSlotItem.qty <= 0) { hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', level: 0, data: null }; }

                renderPlotAsset(plot);
                updateUI();
                updateHotbarVisuals();
            } 
            else if (plot.status === 'ready') {
                let mult = 1.0 + (plot.seedLevel * 0.5); 
                if (plot.mutationType === 'golden') mult *= 2.5;
                if (plot.mutationType === 'frozen') mult *= 5.5;
                if (plot.mutationType === 'divine') mult *= 15.0;

                let calculatedPrice = fruitData[plot.fruit].basePrice * mult * plot.weight;
                let fruitUniqueKey = `${plot.fruit}_fruta`;

                addItemToCollectedHotbar(fruitUniqueKey, 'fruta', 1, { icon: fruitData[plot.fruit].icon, price: calculatedPrice, fullName: `${fruitData[plot.fruit].name}` });

                plot.status = 'empty'; plot.fruit = null; plot.mutationType = null;
                plot.element.innerHTML = `<span style="color:#26170c; font-size:9px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                
                updateUI();
                updateHotbarVisuals();
            }
        }

        function executeAttack() {
            if (isAttacking) return;
            isAttacking = true;
            
            let wep = arsenal[player.weapon];
            let renderWeapon = document.getElementById('weapon-render');
            renderWeapon.style.transform = "rotate(-65deg)";
            
            setTimeout(() => { renderWeapon.style.transform = "rotate(0deg)"; isAttacking = false; }, wep.speed);

            if (!player.inDungeon) return;

            dungeon.entities.forEach((ent) => {
                let dist = Math.sqrt(Math.pow(player.x - ent.x, 2) + Math.pow(player.y - ent.y, 2));
                if (dist <= wep.range) {
                    let finalDmg = wep.damage;
                    if (ent.type === 'minerio' && player.weapon === 'picareta') finalDmg *= 2;
                    ent.hp -= finalDmg;
                    
                    ent.el.style.transform = "scale(1.2) translateY(-4px)";
                    setTimeout(() => { if (ent.el) ent.el.style.transform = "scale(1)"; }, 100);

                    if (ent.hp <= 0) handleEntityDeath(ent);
                }
            });

            dungeon.entities = dungeon.entities.filter(e => e.hp > 0);
            checkDungeonFloorClear();
        }

        function handleEntityDeath(ent) {
            if (ent.el) ent.el.remove();
            
            if (ent.type === 'slime' || ent.type === 'goblin') {
                gameState.coins += ent.level * 6;
                if (Math.random() < 0.45) {
                    let seeds = ['maca', 'banana', 'cenoura', 'laranja', 'tomate'];
                    let picked = seeds[Math.floor(Math.random() * seeds.length)];
                    addItemToCollectedHotbar(`${picked}_semente`, 'semente', Math.min(Math.floor(dungeon.floor / 3) + 1, 4), null);
                }
            } 
            else if (ent.type === 'boss') {
                gameState.coins += 250;
                alert("👑 O Rei Slime Pixelado foi obliterado! Sementes Divinas Nvl 5 coletadas!");
                addItemToCollectedHotbar('divina_semente', 'semente', 5, null);
            }
            else if (ent.type === 'minerio') {
                if (ent.kind === 'ferro') minerios.ferro += (Math.floor(Math.random() * 3) + 2);
                if (ent.kind === 'ouro') minerios.ouro += (Math.floor(Math.random() * 2) + 1);
            }
            updateHotbarVisuals();
            updateUI();
        }

        function enterDungeon() {
            player.inDungeon = true;
            dungeon.floor = 1;
            player.hp = player.maxHp; // Restaura vida ao entrar
            document.getElementById('game-canvas').classList.add('dungeon-mode');
            document.getElementById('farm-zones').style.display = 'none';
            
            document.getElementById('npc-tiao').style.display = 'none';
            document.getElementById('npc-mago').style.display = 'none';
            document.getElementById('npc-chico').style.display = 'none';
            
            updateUI();
            generateDungeonFloor();
        }

        function exitDungeon() {
            player.inDungeon = false;
            document.getElementById('game-canvas').classList.remove('dungeon-mode');
            document.getElementById('farm-zones').style.display = 'flex';
            
            document.getElementById('npc-tiao').style.display = 'flex';
            document.getElementById('npc-mago').style.display = 'flex';
            document.getElementById('npc-chico').style.display = 'flex';
            
            document.getElementById('dungeon-entities-layer').innerHTML = '';
            dungeon.entities = [];
            updateUI();
        }

        function generateDungeonFloor() {
            let layer = document.getElementById('dungeon-entities-layer');
            layer.innerHTML = '';
            dungeon.entities = [];

            if (dungeon.floor % 5 === 0) {
                spawnEntity('boss', 620, 280, 240 + (dungeon.floor * 40), "👑");
            } else {
                let count = 2 + dungeon.floor;
                for (let i = 0; i < Math.min(count, 7); i++) {
                    let rx = Math.random() * 600 + 350;
                    let ry = Math.random() * 300 + 160;
                    if (Math.random() > 0.5) spawnEntity('slime', rx, ry, 22 + (dungeon.floor * 7), "🟢");
                    else spawnEntity('goblin', rx, ry, 36 + (dungeon.floor * 9), "👹");
                }
            }

            let mines = Math.floor(Math.random() * 3) + 2;
            for(let i=0; i<mines; i++) {
                let rx = Math.random() * 650 + 300;
                let ry = Math.random() * 300 + 160;
                if(Math.random() > 0.4) spawnEntity('minerio', rx, ry, 20, "🪨", 'ferro');
                else spawnEntity('minerio', rx, ry, 35, "✨", 'ouro');
            }
        }

        function spawnEntity(type, x, y, hp, icon, kind = '') {
            let layer = document.getElementById('dungeon-entities-layer');
            let el = document.createElement('div');
            el.className = "dungeon-ent";
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.innerHTML = `${icon}<div class="hp-bar"><div class="hp-fill"></div></div>`;
            layer.appendChild(el);

            dungeon.entities.push({ type, x, y, hp, maxHp: hp, el, kind, level: dungeon.floor });
        }

        // MONSTROS CAUSAM DANO SE ESTIVEREM COLADOS NO JOGADOR
        function dungeonAIAndDamageUpdate() {
            dungeon.entities.forEach(ent => {
                if (ent.type === 'minerio') return;

                let dx = player.x - ent.x;
                let dy = player.y - ent.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 5 && dist < 350) {
                    let sp = ent.type === 'boss' ? 1.6 : 2.4;
                    ent.x += (dx / dist) * sp;
                    ent.y += (dy / dist) * sp;
                    ent.el.style.left = ent.x + 'px';
                    ent.el.style.top = ent.y + 'px';
                }

                // Colisão de Dano contra o Jogador
                if (dist < 32) {
                    player.hp -= 1.5; // Sofre dano por segundo de contato
                    if (player.hp <= 0) {
                        player.hp = 0;
                        handlePlayerDefeat();
                    }
                    updateUI();
                }
            });
        }

        function handlePlayerDefeat() {
            alert("💔 Você desmaiou na Masmorra! Chico te resgatou mas cobrou 20% das suas moedas pelo serviço.");
            gameState.coins *= 0.8;
            exitDungeon();
            player.x = 200;
            player.y = 250;
            player.hp = player.maxHp;
            updateUI();
        }

        function checkDungeonFloorClear() {
            let hostiles = dungeon.entities.filter(e => e.type !== 'minerio').length;
            if (hostiles === 0) {
                setTimeout(() => {
                    dungeon.floor++;
                    alert(`⚔️ Descendo para o andar combatente de número ${dungeon.floor}!`);
                    generateDungeonFloor();
                }, 650);
            }
        }

        function handleNPCDetection() {
            let tiaoDiv = document.getElementById('npc-tiao');
            let magoDiv = document.getElementById('npc-mago');
            let chicoDiv = document.getElementById('npc-chico');
            let hackerDiv = document.getElementById('npc-hacker');
            let dungDiv = document.getElementById('npc-dungeon');

            if (player.inDungeon) {
                if (Math.sqrt(Math.pow(player.x - dungDiv.offsetLeft, 2) + Math.pow(player.y - dungDiv.offsetTop, 2)) < 70) exitDungeon();
                return;
            }

            if (Math.sqrt(Math.pow(player.x - tiaoDiv.offsetLeft, 2) + Math.pow(player.y - tiaoDiv.offsetTop, 2)) < 65) openNPCModal('tiao');
            else if (Math.sqrt(Math.pow(player.x - magoDiv.offsetLeft, 2) + Math.pow(player.y - magoDiv.offsetTop, 2)) < 65) openNPCModal('mago');
            else if (Math.sqrt(Math.pow(player.x - chicoDiv.offsetLeft, 2) + Math.pow(player.y - chicoDiv.offsetTop, 2)) < 65) openNPCModal('chico');
            else if (Math.sqrt(Math.pow(player.x - dungDiv.offsetLeft, 2) + Math.pow(player.y - dungDiv.offsetTop, 2)) < 65) enterDungeon();
            else if (Math.sqrt(Math.pow(player.x - hackerDiv.offsetLeft, 2) + Math.pow(player.y - hackerDiv.offsetTop, 2)) < 65) openNPCModal('hacker');
        }

            modal.style.display = 'block';

            let content = document.getElementById('modal-content');

                let ironCost = wep.level * 4;

            document.getElementById('weapon-status').innerText = arsenal[key].name;
            renderForgeTab();
            updateUI();

        function upgradeWeapon(key, iron, gold) {
            if (minerios.ferro >= iron && minerios.ouro >= gold) {
                minerios.ferro -= iron; minerios.ouro -= gold;
                arsenal[key].level++;
                arsenal[key].damage = Math.floor(arsenal[key].damage * 1.35);
                alert(`🔨 Evolução concluída com sucesso!`);
                renderForgeTab();
            } else {

        function buyItem(type, target, cost) {
            if (gameState.coins >= cost) {
                if (type === 'seed') addItemToCollectedHotbar(target, 'semente', 1, null);
                else if (type === 'upgrade') { if(gameState.maxPlots < 15) { gameState.maxPlots++; createPlots(); } }
                gameState.coins -= cost; updateUI(); updateHotbarVisuals();
            }
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; currentModalNPC = null; }

        function gameLoop() {
            let sp = player.speed;
            if (player.weapon === 'foice') sp *= 0.65;

            if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= sp;
            if (keysPressed['d'] || keysPressed['arrowright']) player.x += sp;
            if (keysPressed['w'] || keysPressed['arrowup']) player.y -= sp;
            if (keysPressed['s'] || keysPressed['arrowdown']) player.y += sp;
            
            player.x = Math.max(0, Math.min(window.innerWidth - 45, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 135, player.y));

            let pEl = document.getElementById('player');
            if (pEl) { pEl.style.left = player.x + 'px'; pEl.style.top = player.y + 'px'; }

            requestAnimationFrame(gameLoop);
        }

        window.onload = init;
    </script>
</body>
</html>
